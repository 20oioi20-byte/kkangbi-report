<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>센터 실적/근태 업로드</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Malgun Gothic", sans-serif;
    background: #f4f5f7; color: #1c1f26; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 32px 28px;
    max-width: 720px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1; padding: 10px; border: 1px solid #d9dce1; background: #fff; border-radius: 8px;
    cursor: pointer; font-size: 14px; color: #5b6472;
  }
  .tab-btn.active { background: #3b6ef6; color: #fff; border-color: #3b6ef6; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  textarea.paste-box {
    width: 100%; min-height: 60px; padding: 10px 12px; border: 1px solid #d9dce1;
    border-radius: 8px; font-size: 13px; font-family: monospace; margin-bottom: 10px;
  }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; display: block; overflow-x: auto; white-space: nowrap; }
  .preview-table th { background: #f4f5f7; padding: 6px; text-align: left; color: #5b6472; }
  .preview-table td { padding: 4px; }
  .preview-table input {
    width: 70px; padding: 4px 6px; border: 1px solid #d9dce1; border-radius: 4px; font-size: 12px;
  }
  button.secondary {
    width: 100%; padding: 11px; border: 1px solid #3b6ef6; border-radius: 8px;
    background: #fff; color: #3b6ef6; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .center-name { font-size: 15px; color: #5b6472; margin-bottom: 24px; }
  .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .date-row label { font-size: 14px; color: #5b6472; }
  input[type="date"] {
    flex: 1; padding: 10px 12px; border: 1px solid #d9dce1; border-radius: 8px; font-size: 14px;
  }
  .dropzone {
    border: 2px dashed #c7cbd3; border-radius: 10px; padding: 32px 16px;
    text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 16px;
  }
  .dropzone.drag { border-color: #3b6ef6; background: #f0f4ff; }
  .dropzone p { margin: 4px 0; color: #5b6472; font-size: 14px; }
  .dropzone .hint { font-size: 12px; color: #9aa1ac; }
  #fileInput { display: none; }
  .filelist { margin-bottom: 16px; }
  .fileitem {
    display: flex; justify-content: space-between; align-items: center;
    background: #f4f5f7; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 13px;
  }
  .fileitem button { border: none; background: none; color: #c94040; cursor: pointer; font-size: 13px; }
  button.submit {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: #3b6ef6; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button.submit:disabled { background: #c7cbd3; cursor: not-allowed; }
  .status { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
  .status.ok { color: #1a8f4c; }
  .status.err { color: #c94040; }
  .invalid { text-align: center; padding: 40px 20px; }
  .invalid h2 { color: #c94040; }
</style>
</head>
<body>

<div class="card" id="app">
  <p style="text-align:center;color:#9aa1ac;">확인 중...</p>
</div>

<script>
// ====== 설정 (실제 값으로 교체) ======
const SB_FUNCTION_URL = 'https://zbiwyqwjehnogxkzlhxx.supabase.co/functions/v1/center-report-upload';
const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiaXd5cXdqZWhub2d4a3psaHh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTQ1MzYsImV4cCI6MjA5NjY3MDUzNn0.SQJjHnDcMTRyElxtY9E-04yIkzPVF35L8hcx0lSyG48';
// =====================================

function getToken() {
  const path = window.location.pathname; // /upload/{token}
  const parts = path.split('/').filter(Boolean);
  return parts[parts.length - 1] || new URLSearchParams(location.search).get('token');
}

const token = getToken();
const app = document.getElementById('app');
let selectedFiles = [];

async function init() {
  if (!token) {
    renderInvalid();
    return;
  }
  // 토큰 유효성은 실제 업로드 시점에 서버(Edge Function)에서 검증.
  // 여기서는 UI만 우선 렌더링 (센터명은 업로드 시 응답으로 확인해도 되고,
  // 별도 verify 엔드포인트를 두면 더 매끄러움 - 아래 verify 시도)
  renderForm('실적/근태 자료 업로드');
  tryVerify();
}

async function tryVerify() {
  try {
    const res = await fetch(SB_FUNCTION_URL + '?action=verify&token=' + encodeURIComponent(token), {
      headers: { 'Authorization': 'Bearer ' + SB_ANON_KEY }
    });
    const data = await res.json();
    if (data.valid) {
      document.getElementById('centerName').textContent = data.center_name;
    } else {
      renderInvalid();
    }
  } catch (e) {
    // verify 실패해도 업로드 자체는 시도 가능하도록 둠 (네트워크 문제일 수 있음)
  }
}

function renderInvalid() {
  app.innerHTML = `
    <div class="invalid">
      <h2>유효하지 않은 링크입니다</h2>
      <p style="color:#5b6472;font-size:14px;">관리자에게 새 업로드 링크를 요청해 주세요.</p>
    </div>`;
}

function renderForm() {
  const today = new Date().toISOString().slice(0, 10);
  app.innerHTML = `
    <h1>실적/근태 자료 업로드</h1>
    <div class="center-name" id="centerName">센터 확인 중...</div>

    <div class="tabs">
      <button class="tab-btn active" id="tabFileBtn" onclick="switchTab('file')">파일 업로드</button>
      <button class="tab-btn" id="tabManualBtn" onclick="switchTab('manual')">직접입력(붙여넣기)</button>
    </div>

    <div class="tab-panel active" id="panelFile">
      <div class="date-row">
        <label>보고일자</label>
        <input type="date" id="reportDate" value="${today}">
      </div>
      <div class="dropzone" id="dropzone">
        <p><strong>파일을 끌어다 놓거나 클릭하여 선택</strong></p>
        <p class="hint">엑셀, 워드, PDF, 이미지, 텍스트 파일 가능 (AI 자동분석)</p>
      </div>
      <input type="file" id="fileInput" multiple>
      <div class="filelist" id="fileList"></div>
      <button class="submit" id="submitBtn" disabled>업로드</button>
      <div class="status" id="status"></div>
    </div>

    <div class="tab-panel" id="panelManual">
      <div class="date-row">
        <label>보고일자</label>
        <input type="date" id="manualDate" value="${today}">
      </div>
      <p class="hint" style="margin-bottom:6px;">엑셀에서 해당 날짜 행을 그대로 복사해서 아래에 붙여넣으세요 (Ctrl+V)</p>
      <textarea class="paste-box" id="pasteBox" placeholder="예: 171.5	33	91.5	29.5	89.4%	..."></textarea>
      <button class="secondary" id="previewBtn">미리보기</button>
      <div id="previewArea"></div>
      <button class="submit" id="manualSaveBtn" style="display:none;">저장</button>
      <div class="status" id="manualStatus"></div>
    </div>

    <div id="historySection"></div>
  `;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => addFiles(e.target.files));
  document.getElementById('submitBtn').addEventListener('click', submitFiles);
  document.getElementById('previewBtn').addEventListener('click', previewPaste);

  loadHistory();
  loadSchema();
}

function switchTab(name) {
  document.getElementById('tabFileBtn').classList.toggle('active', name === 'file');
  document.getElementById('tabManualBtn').classList.toggle('active', name === 'manual');
  document.getElementById('panelFile').classList.toggle('active', name === 'file');
  document.getElementById('panelManual').classList.toggle('active', name === 'manual');
}

let rowSchema = [];

async function loadSchema() {
  try {
    const res = await fetch(SB_FUNCTION_URL + '?action=schema&token=' + encodeURIComponent(token), {
      headers: { 'Authorization': 'Bearer ' + SB_ANON_KEY }
    });
    const data = await res.json();
    if (data.success) {
      rowSchema = data.row_schema || [];
      if (rowSchema.length === 0) {
        document.getElementById('panelManual').innerHTML =
          `<p class="hint">이 센터는 아직 직접입력 양식이 설정되지 않았습니다. 파일 업로드를 이용해 주세요.</p>`;
        document.getElementById('tabManualBtn').disabled = true;
      }
    }
  } catch (e) { /* 조용히 무시 - 파일업로드는 그대로 사용 가능 */ }
}

function previewPaste() {
  const raw = document.getElementById('pasteBox').value.trim();
  const previewArea = document.getElementById('previewArea');
  if (!raw) { previewArea.innerHTML = ''; return; }

  // 탭 또는 연속 공백으로 분리 (엑셀 붙여넣기는 탭 구분)
  const values = raw.split('\t').map(v => v.trim());

  if (values.length !== rowSchema.length) {
    previewArea.innerHTML = `<p style="color:#c94040;font-size:13px;">
      입력된 항목 수(${values.length}개)가 양식 항목 수(${rowSchema.length}개)와 다릅니다.
      엑셀에서 "총원"부터 마지막 칸까지 정확히 복사했는지 확인해 주세요.</p>`;
    return;
  }

  const rowsHtml = rowSchema.map((col, i) => `
    <tr>
      <td style="color:#5b6472;">${col.key}</td>
      <td><input type="text" data-key="${col.key}" data-group="${col.group}" value="${values[i] ?? ''}"></td>
    </tr>`).join('');

  previewArea.innerHTML = `
    <table class="preview-table" style="display:table;">
      <thead><tr><th>항목</th><th>값 (직접 수정 가능)</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;

  document.getElementById('manualSaveBtn').style.display = 'block';
  document.getElementById('manualSaveBtn').onclick = saveManualEntry;
}

async function saveManualEntry() {
  const statusEl = document.getElementById('manualStatus');
  const reportDate = document.getElementById('manualDate').value;
  const inputs = document.querySelectorAll('#previewArea input');

  const values = {};
  inputs.forEach(inp => {
    values[inp.dataset.key] = { value: inp.value, group: inp.dataset.group };
  });

  statusEl.className = 'status';
  statusEl.textContent = '저장 중...';

  try {
    const res = await fetch(SB_FUNCTION_URL + '?action=manual-entry', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + SB_ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, report_date: reportDate, values })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '저장 실패');

    statusEl.className = 'status ok';
    statusEl.textContent = `${reportDate} 자료가 저장되었습니다.`;
    document.getElementById('pasteBox').value = '';
    document.getElementById('previewArea').innerHTML = '';
    document.getElementById('manualSaveBtn').style.display = 'none';
    await loadHistory();
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = '저장 실패: ' + e.message;
  }
}

async function loadHistory() {
  const section = document.getElementById('historySection');
  if (!section) return;
  section.innerHTML = `<p style="text-align:center;color:#9aa1ac;font-size:13px;margin-top:20px;">누적 현황 불러오는 중...</p>`;

  try {
    const res = await fetch(SB_FUNCTION_URL + '?action=history&token=' + encodeURIComponent(token), {
      headers: { 'Authorization': 'Bearer ' + SB_ANON_KEY }
    });
    const data = await res.json();
    if (!data.success) {
      section.innerHTML = '';
      return;
    }
    renderHistory(data.rows);
  } catch (e) {
    section.innerHTML = '';
  }
}

function renderHistory(rows) {
  const section = document.getElementById('historySection');
  if (!rows || rows.length === 0) {
    section.innerHTML = `<p style="text-align:center;color:#9aa1ac;font-size:13px;margin-top:20px;">아직 등록된 실적이 없습니다.</p>`;
    return;
  }

  const statusLabel = { success: '완료', pending: '분석중', needs_review: '확인필요', failed: '실패' };
  const statusColor = { success: '#1a8f4c', pending: '#9aa1ac', needs_review: '#c98a20', failed: '#c94040' };

  const rowsHtml = rows.map(r => {
    const summary = summarizeData(r.performance_data) || summarizeData(r.attendance_data) || '-';
    const label = statusLabel[r.parsed_status] || r.parsed_status;
    const color = statusColor[r.parsed_status] || '#5b6472';
    return `
      <tr>
        <td style="padding:8px 6px;border-bottom:1px solid #eee;">${r.report_date}</td>
        <td style="padding:8px 6px;border-bottom:1px solid #eee;color:${color};font-weight:600;">${label}</td>
        <td style="padding:8px 6px;border-bottom:1px solid #eee;font-size:12px;color:#5b6472;">${summary}</td>
      </tr>`;
  }).join('');

  section.innerHTML = `
    <h2 style="font-size:15px;margin:24px 0 10px;">누적 업로드 현황 (최근 ${rows.length}건)</h2>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead>
        <tr style="text-align:left;color:#9aa1ac;font-size:12px;">
          <th style="padding:6px;">보고일자</th><th style="padding:6px;">상태</th><th style="padding:6px;">주요 실적</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

function summarizeData(obj) {
  if (!obj || typeof obj !== 'object') return '';
  const entries = Object.entries(obj).slice(0, 3);
  return entries.map(([k, v]) => `${k} ${v}`).join(' · ');
}

function addFiles(fileListObj) {
  for (const f of fileListObj) selectedFiles.push(f);
  renderFileList();
}

function renderFileList() {
  const el = document.getElementById('fileList');
  el.innerHTML = selectedFiles.map((f, i) => `
    <div class="fileitem">
      <span>${f.name} (${(f.size/1024).toFixed(0)}KB)</span>
      <button onclick="removeFile(${i})">삭제</button>
    </div>`).join('');
  document.getElementById('submitBtn').disabled = selectedFiles.length === 0;
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderFileList();
}

async function submitFiles() {
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('submitBtn');
  const reportDate = document.getElementById('reportDate').value;

  btn.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = '업로드 중...';

  try {
    for (const file of selectedFiles) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('token', token);
      formData.append('report_date', reportDate);

      const res = await fetch(SB_FUNCTION_URL + '?action=upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + SB_ANON_KEY },
        body: formData
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '업로드 실패');
    }
    statusEl.className = 'status ok';
    statusEl.textContent = `${selectedFiles.length}개 파일 업로드 완료.`;
    selectedFiles = [];
    renderFileList();
    await loadHistory();
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = '업로드 실패: ' + e.message;
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
