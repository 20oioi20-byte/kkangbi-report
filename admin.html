<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="깡비서">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>🤖 깡비서</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🤖</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;color:#222;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;min-width:250px;background:#000;border-right:none;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-sec{padding:8px 10px;border-bottom:1px solid #f5f5f5}
.sb-sec-title{font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sb-btn{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:#B5B5B7;border:none;background:none;width:100%;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,0.08)}
.sb-btn.active{background:rgba(0,165,255,0.16);color:#00A5FF;font-weight:600}
.sb-icon{font-size:13px;width:16px;text-align:center}
.sb-link-item{display:flex;align-items:center;gap:3px;padding:3px 4px;border-radius:5px;margin-bottom:2px}
.sb-link-item:hover{background:#f5f5f5}
.sb-link-btn{flex:1;display:flex;align-items:center;gap:5px;padding:3px 4px;cursor:pointer;font-size:11px;color:#444;border:none;background:none;text-align:left;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sb-link-btn:hover{color:#00A5FF}
.sb-drag-handle,.link-drag-handle,.chip-sort-handle{cursor:grab;color:#ccc;flex-shrink:0}
.sb-drag-handle{font-size:12px;padding:0 2px}.link-drag-handle{font-size:14px}.chip-sort-handle{font-size:9px;padding:0 1px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:7px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}
.period-label{font-size:14px;font-weight:700;min-width:100px}
.nav-btn{background:none;border:1px solid #ddd;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.add-btn{background:#00A5FF;color:#fff;border:none;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:600}
.search-box{padding:4px 9px;border:1px solid #ddd;border-radius:16px;font-size:11px;outline:none;width:150px;font-family:inherit}
.search-box:focus{border-color:#00A5FF}
.quick-bar{background:#fff;border-bottom:1px solid #e8f0fe;padding:6px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.quick-bar input{flex:1;padding:6px 10px;border:1.5px solid #c5d8fb;border-radius:20px;font-size:12px;font-family:inherit;outline:none;background:#f8fbff}
.quick-bar input:focus{border-color:#00A5FF;background:#fff}
.quick-bar-btn{background:#00A5FF;color:#fff;border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.today-panel{background:#fff;border-bottom:1px solid #e8f0fe;padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;min-height:32px}
.tp-title{font-size:10px;font-weight:700;color:#00A5FF;white-space:nowrap}
.tp-chip{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:10px}
.f-btn{padding:3px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:10px;color:#555;width:100%;text-align:left;margin-bottom:2px}
.f-btn:hover{background:#f5f5f5}
.f-btn.active{background:#00A5FF;color:#fff;border-color:#00A5FF;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd;border-radius:8px;overflow:hidden;border:1px solid #ddd}
.cal-head{background:#f8f9fa;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#666}
.cal-head.sun{color:#d32f2f}.cal-head.sat{color:#1557b0}
.cal-cell{background:#fff;padding:3px;height:130px;overflow:hidden;position:relative}
.cal-cell:hover{background:#fafbff}
.cal-cell.other{background:#fafafa}.cal-cell.other .dn{color:#ccc}
.cal-cell.today .dn{background:#00A5FF;color:#fff!important;border-radius:50%;font-size:10px}
.cal-cell.drag-over{background:#e8f0fe!important;outline:2px dashed #00A5FF}
.cal-events{overflow-y:auto;max-height:95px}
.dn{font-size:10px;font-weight:600;color:#333;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.holiday-label{font-size:8px;color:#d32f2f;padding:0 2px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.more-btn{font-size:8px;color:#00A5FF;cursor:pointer;padding:1px 3px;background:#e8f0fe;border-radius:3px;border:none;width:100%;text-align:left;margin-top:1px}
.chip-wrap{display:flex;align-items:center;gap:2px;margin-bottom:1px;position:relative}
.sb-link-item.d-over,.link-manage-row.d-over,.chip-wrap.d-over{border-top:2px solid #00A5FF}
.chip-chk{width:11px;height:11px;flex-shrink:0;cursor:pointer;accent-color:#188038;margin:0}
.chip{font-size:9px;padding:1px 4px;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;flex:1;min-width:0;max-width:130px;user-select:none}
.chip.important{box-shadow:0 0 0 1.5px #fbbc04;font-weight:700}
.chip.search-match{outline:2px solid #fbbc04}
.chip-status{font-size:9px;cursor:pointer;flex-shrink:0;opacity:.6;line-height:1}
.chip-status:hover{opacity:1}
.memo-icon{font-size:8px;flex-shrink:0;opacity:.6}
.memo-tooltip{display:none;position:fixed;z-index:500;background:#333;color:#fff;font-size:10px;padding:5px 8px;border-radius:6px;white-space:pre-wrap;max-width:200px;line-height:1.5;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
@media(hover:hover){.chip-wrap:hover .memo-tooltip{display:block}}
.scard{background:#fff;border-radius:9px;border:1px solid #e0e0e0;padding:12px;margin-bottom:10px}
.scard h4{font-size:12px;font-weight:700;margin-bottom:8px}
.wstat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.wstat{background:#f8f9fa;border-radius:7px;padding:7px;text-align:center}
.wstat-num{font-size:16px;font-weight:700;color:#00A5FF}
.wstat-lbl,.ws-lbl{font-size:9px;color:#888;margin-top:1px}
.rrow{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.rrow:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;background:#e8f0fe;color:#1557b0}
.badge.applied{background:#e6f4ea;color:#1b5e20}
.badge.notapplied{background:#f1f3f4;color:#999}
.iBtn{background:none;border:none;cursor:pointer;font-size:12px;color:#ccc;padding:1px 3px}
.iBtn:hover{color:#333}
.loading{display:flex;align-items:center;gap:7px;color:#aaa;font-size:11px;padding:7px 0}
.spin{width:13px;height:13px;border:2px solid #eee;border-top-color:#00A5FF;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.brief-ev{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.brief-ev:last-child{border-bottom:none}
.ai-priority{background:#f8f9fa;border-left:3px solid #00A5FF;border-radius:0 7px 7px 0;padding:9px 11px;font-size:11px;line-height:1.8;white-space:pre-wrap}
.spicker{position:fixed;z-index:300;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:5px;display:flex;flex-direction:column;gap:2px;min-width:130px}
.spicker-item{padding:6px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.spicker-item:hover{background:#f5f5f5}
.client-card{background:#fff;border:1px solid #e0e0e0;border-radius:9px;padding:12px;cursor:pointer}
.client-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.history-item{padding:8px 10px;border-bottom:1px solid #f5f5f5;font-size:11px;line-height:1.6}
.history-item:last-child{border-bottom:none}
.history-date{font-size:9px;color:#aaa;margin-bottom:2px}
#floating-ai{position:fixed;bottom:18px;right:18px;z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
#ai-panel{display:none;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:12px;width:270px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
#ai-fab{width:42px;height:42px;border-radius:50%;background:#00A5FF;color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 3px 10px rgba(26,115,232,.4)}
#sb-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;padding:2px 6px;color:#444}
.link-manage-row{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.lk-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#f8fbff;border:1px solid #c5d8fb;border-radius:8px;padding:8px 12px}
.week-nav-btn{background:none;border:1px solid #c5d8fb;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:12px;color:#00A5FF}
.week-nav-btn:hover{background:#e8f0fe}
.week-nav-label{flex:1;text-align:center;font-size:12px;font-weight:700;color:#1557b0;cursor:pointer;text-decoration:underline dotted}
#toast-el{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;transition:opacity .3s;opacity:0}
#voice-btn{display:none}
.ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ws-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;position:relative;min-height:160px}
.ws-card.d-over{outline:2px dashed #00A5FF;background:#f0f4ff;border-top:1px solid #e0e0e0}
.ws-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:grab}
.ws-card-title{font-size:12px;font-weight:700;color:#333}
.ws-card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.ws-card:hover .ws-card-actions{opacity:1}
.ws-action-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#aaa;padding:2px 4px}
.ws-metric-row{display:flex;gap:8px;margin-bottom:8px}
.ws-metric{flex:1;background:#f8f9fa;border-radius:7px;padding:8px;text-align:center}
.ws-num{font-size:20px;font-weight:700}
.ws-ev-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.ws-ev-item:last-child{border-bottom:none}
.ws-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ws-ev-chk{width:12px;height:12px;accent-color:#188038;flex-shrink:0;cursor:pointer}
.ws-ev-text{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.ws-ev-time{font-size:10px;color:#aaa;flex-shrink:0}
.ws-dday-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.ws-dday-row:last-child{border-bottom:none}
.ws-dday-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;flex-shrink:0}
.ws-dday-title{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.ws-dday-client{font-size:10px;color:#aaa;flex-shrink:0}
.ws-client-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px;cursor:pointer}
.ws-client-row:last-child{border-bottom:none}
.ws-client-row:hover{background:#fafbff}
.ws-client-name{flex:1;font-weight:600}
.ws-prog{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.ws-prog-fill{height:100%;background:#00A5FF}
.ws-chat-box{display:flex;flex-direction:column;height:100%;min-height:200px}
.ws-chat-msgs{flex:1;overflow-y:auto;font-size:11px;margin-bottom:8px;max-height:180px}
.ws-chat-msg{padding:5px 8px;border-radius:7px;margin-bottom:4px;line-height:1.5;max-width:90%;user-select:text;-webkit-user-select:text;cursor:text}
.ws-chat-msg.user{background:#e8f0fe;color:#1557b0;margin-left:auto;text-align:right}
.ws-chat-msg.ai{background:#f8f9fa;color:#333}
.ws-copy-btn{font-size:9px;padding:1px 6px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#888;margin-top:4px;display:inline-block}
.ws-copy-btn:hover{background:#f0f0f0;color:#333}
.ws-chat-input-row{display:flex;gap:4px}
.ws-chat-input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:14px;font-size:11px;font-family:inherit;outline:none}
.ws-chat-input:focus{border-color:#00A5FF}
.ws-chat-send{background:#00A5FF;color:#fff;border:none;border-radius:14px;padding:5px 10px;cursor:pointer;font-size:10px;white-space:nowrap}
.ws-chat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ws-chat-clear{font-size:9px;padding:2px 8px;border:1px solid #f0c0c0;border-radius:10px;background:#fff;color:#d32f2f;cursor:pointer}
.ws-chat-clear:hover{background:#fce8e6}
.ws-chat-cfg{font-size:9px;padding:2px 8px;border:1px solid #cfe0ff;border-radius:10px;background:#fff;color:#1557b0;cursor:pointer}
.ws-chat-cfg:hover{background:#eef4ff}
.ws-settings-panel{background:#f8f9fa;border:1px solid #e8f0fe;border-radius:8px;padding:10px;font-size:11px}
.ws-settings-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0}
.ws-settings-row:last-child{border-bottom:none}
.ws-toggle{width:32px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.ws-toggle.on{background:#00A5FF}.ws-toggle.off{background:#ccc}
.ws-toggle::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s}
.ws-toggle.on::after{left:18px}.ws-toggle.off::after{left:2px}
.rep-item{border:1px solid #e8f0fe;border-radius:8px;margin-bottom:6px;overflow:hidden}
.rep-head{background:#f8fbff;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;color:#1557b0}
.rep-body{padding:8px 12px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:80px;overflow-y:auto}
.draft-box{background:#f8f9fa;border:1px solid #eee;border-radius:7px;padding:9px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:220px;overflow-y:auto;margin-top:7px}
.modal{background:#fff;border-radius:12px;padding:18px;width:440px;max-width:96vw;max-height:88vh;overflow-y:auto;position:relative}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px;padding-right:22px}
.modal label{display:block;font-size:10px;font-weight:700;color:#888;margin:9px 0 3px}
.modal input,.modal select,.modal textarea{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.modal textarea{resize:vertical;min-height:55px}
.chk-row{display:flex;align-items:center;gap:6px;margin-top:9px}
.chk-row input{width:auto}
.chk-row label{margin:0;font-size:11px;color:#333;font-weight:600}
.mactions{display:flex;gap:6px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap}
.btn-c,.btn-p,.btn-d,.btn-o,.btn-g{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;border:none}
.btn-c{border:1px solid #ddd;background:#fff}
.btn-p{background:#00A5FF;color:#fff;font-weight:700}
.btn-d{background:#d32f2f;color:#fff}
.btn-o{border:1px solid #00A5FF;color:#00A5FF;background:#fff}
.btn-g{background:#188038;color:#fff;font-weight:700}
.xbtn{position:absolute;top:10px;right:12px;background:none;border:none;font-size:17px;cursor:pointer;color:#999}
.drow{display:flex;gap:5px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.dlbl{font-size:10px;color:#aaa;width:52px;flex-shrink:0;padding-top:2px}
.dval{font-size:12px;color:#333;flex:1;line-height:1.5}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
@media(max-width:680px){
#sb-toggle{display:inline-flex}
.sidebar{position:fixed;left:0;top:0;height:100vh;z-index:300;transform:translateX(-100%);transition:transform .22s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299}
.sb-overlay.open{display:block}
#voice-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:16px;flex-shrink:0;background:#f0f0f0;color:#555}
#voice-btn.listening{background:#d32f2f;color:#fff;animation:pulse .8s infinite}
.ws-grid{grid-template-columns:1fr}
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* 공통 유틸 */
.rep-cur{background:#f8fbff;border:1px solid #e8f0fe;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:180px;overflow-y:auto}
.sel-sm{padding:5px 8px;border:1px solid #ddd;border-radius:8px;font-size:11px;font-family:inherit}
.empty-msg{color:#ccc;font-size:11px;padding:8px 0}
.flex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ttl-sm{font-size:13px;font-weight:700;color:#333}
.muted{font-size:11px;color:#aaa}
.ai-out{background:#f8f9fa;border:1px solid #eee;border-radius:6px;padding:7px;font-size:10px;line-height:1.7;max-height:150px;overflow-y:auto;white-space:pre-wrap}
.rep-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.fld-lbl{font-size:10px;font-weight:700;color:#888;display:block;margin-bottom:3px}
.fld-in{width:100%;padding:5px;border:1px solid #ddd;border-radius:5px;font-size:11px;font-family:inherit}
.redit-radio{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer}
.redit-chk{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
.btn-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.sec-lbl{font-size:11px;font-weight:700;color:#555;margin-bottom:6px}
.hist-box{background:#f8f9fa;border-radius:8px;padding:10px;max-height:260px;overflow-y:auto;margin-bottom:10px}
.ws-link-box{font-size:11px;color:#ccc;padding:8px 0}

.pl-inp{padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.pl-empty{color:#ccc;font-size:12px;padding:30px;text-align:center}
.pl-tbl{width:100%;border-collapse:collapse;font-size:10px}
.pl-err{color:#d32f2f;font-size:11px;padding:10px}


/* 모바일 드래그 가능 AI 버튼 */
#mobile-app .ai-float-btn {
  position: fixed;
  width: 52px; height: 52px;
  background: linear-gradient(135deg,#00A5FF,#0d47a1);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(26,115,232,.4);
  cursor: grab;
  z-index: 200;
  touch-action: none;
  user-select: none;
  border: none;
  color: #fff;
  right: 16px;
  bottom: 90px;
  transition: box-shadow .2s;
}

<body>
<script>
(function(){
  const KEY='kkangbi_auth',PWDKEY='kkangbi_pwd',DEFAULT_PWD='112233';
  const getPWD=()=>localStorage.getItem(PWDKEY)||DEFAULT_PWD;
  if(sessionStorage.getItem(KEY)==='ok')return;
  const el=document.createElement('div');
  el.id='auth-screen';
  el.style.cssText='position:fixed;inset:0;background:#f5f6f8;display:flex;align-items:center;justify-content:center;z-index:99999';
  el.innerHTML='<div style="background:#fff;border-radius:16px;padding:40px 32px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center"><div style="font-size:48px;margin-bottom:12px">🤖</div><div style="font-size:20px;font-weight:700;color:#333;margin-bottom:6px">깡비서</div><div style="font-size:12px;color:#aaa;margin-bottom:28px">6자리 비밀번호를 입력하세요</div><div id="adots" style="display:flex;justify-content:center;gap:12px;margin-bottom:24px"></div><div id="anumpad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"></div><div id="amsg" style="font-size:12px;color:#d32f2f;min-height:18px"></div></div>';
  document.body.prepend(el);
  let pwd='';
  const dots=document.getElementById('adots');
  const pad=document.getElementById('anumpad');
  const msg=document.getElementById('amsg');
  for(let i=0;i<6;i++){const d=document.createElement('div');d.id='ad'+i;d.style.cssText='width:16px;height:16px;border-radius:50%;background:#e0e0e0;transition:background .2s';dots.appendChild(d);}
  const upd=()=>{for(let i=0;i<6;i++)document.getElementById('ad'+i).style.background=i<pwd.length?'#00A5FF':'#e0e0e0';};
  const clr=()=>{pwd='';upd();msg.textContent='';};
  const verify=()=>{if(pwd===getPWD()){sessionStorage.setItem(KEY,'ok');el.remove();}else{for(let i=0;i<6;i++)document.getElementById('ad'+i).style.background='#d32f2f';msg.textContent='비밀번호가 틀렸습니다.';setTimeout(clr,800);}};
  const inp=n=>{if(pwd.length>=6)return;pwd+=n;upd();if(pwd.length===6)verify();};
  ['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(k=>{const b=document.createElement('button');b.textContent=k;b.style.cssText='background:#f8f9fa;border:none;border-radius:10px;padding:16px;font-size:20px;font-weight:600;color:#333;cursor:pointer';b.onclick=()=>k==='C'?clr():k==='⌫'?(pwd=pwd.slice(0,-1),upd()):inp(k);pad.appendChild(b);});
  window.openChangePWD=function(){
    let step=0,newPwd='';
    const modal=document.createElement('div');
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99999';
    const render=()=>{
      const labels=['현재 비밀번호 입력','새 비밀번호 입력 (6자리)','새 비밀번호 확인'];
      modal.innerHTML=`<div style="background:#fff;border-radius:16px;padding:36px 28px;width:300px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12)"><div style="font-size:16px;font-weight:700;color:#333;margin-bottom:18px">${labels[step]}</div><div id="cdots" style="display:flex;justify-content:center;gap:10px;margin-bottom:20px"></div><div id="cnumpad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px"></div><div id="cmsg" style="font-size:11px;color:#d32f2f;min-height:16px"></div><button onclick="document.querySelector('[style*=rgba]').remove()" style="margin-top:12px;background:none;border:none;color:#aaa;cursor:pointer;font-size:11px">취소</button></div>`;
      document.body.appendChild(modal);
      let cpwd='';
      const cdots=document.getElementById('cdots');
      const cpad=document.getElementById('cnumpad');
      const cmsg=document.getElementById('cmsg');
      for(let i=0;i<6;i++){const d=document.createElement('div');d.id='cd'+i;d.style.cssText='width:14px;height:14px;border-radius:50%;background:#e0e0e0';cdots.appendChild(d);}
      const cupd=()=>{for(let i=0;i<6;i++)document.getElementById('cd'+i).style.background=i<cpwd.length?'#00A5FF':'#e0e0e0';};
      const cclr=()=>{cpwd='';cupd();cmsg.textContent='';};
      const next=()=>{
        if(step===0){if(cpwd!==getPWD()){for(let i=0;i<6;i++)document.getElementById('cd'+i).style.background='#d32f2f';cmsg.textContent='현재 비밀번호가 틀렸습니다.';setTimeout(cclr,800);return;}step=1;modal.remove();render();}
        else if(step===1){newPwd=cpwd;step=2;modal.remove();render();}
        else{if(cpwd!==newPwd){for(let i=0;i<6;i++)document.getElementById('cd'+i).style.background='#d32f2f';cmsg.textContent='비밀번호가 일치하지 않습니다.';setTimeout(cclr,800);return;}localStorage.setItem(PWDKEY,newPwd);modal.remove();alert('✅ 비밀번호가 변경됐습니다.');}
      };
      const cinp=n=>{if(cpwd.length>=6)return;cpwd+=n;cupd();if(cpwd.length===6)next();};
      ['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(k=>{const b=document.createElement('button');b.textContent=k;b.style.cssText='background:#f8f9fa;border:none;border-radius:8px;padding:14px;font-size:18px;font-weight:600;color:#333;cursor:pointer';b.onclick=()=>k==='C'?cclr():k==='⌫'?(cpwd=cpwd.slice(0,-1),cupd()):cinp(k);cpad.appendChild(b);});
    };
    render();
  };
})();
</script>

<script>
// ⚠️⚠️⚠️ 절대 'app_storage' 테이블을 사용하지 말 것 ⚠️⚠️⚠️
// 2026-07 확인: 'app_storage'라는 테이블명 자체가 회사 네트워크 보안장비에 의해
// POST 요청이 차단됨(크기와 무관, 테이블명 문자열 자체가 차단 기준으로 추정됨).
// 데이터 저장(POST/쓰기)이 필요한 모든 신규 기능은 반드시 'rpt_kv' 테이블(key/value 방식)을 사용할 것.
// 이 규칙을 다음 기능 추가/수정 시에도 반드시 지킬 것.
const SB_URL='https://zbiwyqwjehnogxkzlhxx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiaXd5cXdqZWhub2d4a3psaHh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTQ1MzYsImV4cCI6MjA5NjY3MDUzNn0.SQJjHnDcMTRyElxtY9E-04yIkzPVF35L8hcx0lSyG48';

// ═══ 회의록(kkangbi-meeting) 데이터 연동 공용 유틸 ═══
// mt_meetings/mt_calls는 회의록 앱이 관리하는 테이블이지만, 같은 Supabase
// 프로젝트(RLS 비활성)이므로 캘린더에서도 REST로 직접 조회해 참조용으로만 사용한다.
// (쓰기는 하지 않음 — 원본 데이터는 항상 회의록 앱에서만 수정)
async function sbGet(url) {
  try {
    const r = await fetch(url, { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } });
    if (!r.ok) return [];
    return await r.json();
  } catch (e) { return []; }
}
// 고객사명/키워드로 mt_meetings·mt_calls의 center 컬럼을 ilike 매칭해 조회 URL 생성
// 고객사명과 회의록/통화기록/보고기록의 center 표기가 공백·접미사 차이로 어긋나
// 매칭이 안 되는 경우를 줄이기 위해, 원본 키워드마다 정규화된 변형을 추가로 만들어준다.
function expandClientKeywords(list){
  const out=new Set();
  (list||[]).forEach(raw=>{
    const k=(raw||'').trim();
    if(!k) return;
    out.add(k);
    out.add(k.replace(/\s+/g,'')); // 공백 제거본(예: "KB손보 부천" -> "KB손보부천")
    const noSuffix=k.replace(/\s+/g,'').replace(/(센터|지점|본부|㈜|주식회사)$/,'');
    if(noSuffix) out.add(noSuffix);
  });
  return [...out];
}
function meetingQueryUrl(table, dateCol, keywords, select, limit) {
  const kws = (keywords || []).map(k => (k || '').trim().replace(/,/g, '')).filter(Boolean).slice(0, 12);
  let url = `${SB_URL}/rest/v1/${table}?select=${select}&order=${dateCol}.desc&limit=${limit || 50}`;
  if (kws.length) url += `&or=(${kws.map(k => `center.ilike.*${encodeURIComponent(k)}*`).join(',')})`;
  return url;
}
// 특정 고객사(키워드 배열)와 연관된 회의록+통화기록을 함께 조회해 하나의 배열로 병합 반환
async function fetchClientMeetingHistory(keywords) {
  const [meetings, calls, reports] = await Promise.all([
    // [수정] summary/key_points는 구버전 컬럼(비어있음) — 실제 요약은 summary_bullets에 저장됨
    sbGet(meetingQueryUrl('mt_meetings', 'meeting_date', keywords, 'id,title,meeting_date,summary_bullets,center', 30)),
    sbGet(meetingQueryUrl('mt_calls', 'call_datetime', keywords, 'id,call_datetime,summary_bullets,center,counterpart_name', 30)),
    sbGet(meetingQueryUrl('mt_reports', 'report_date', keywords, 'id,title,report_date,summary,center', 30)),
  ]);
  const a = (meetings || []).map(m => ({ type: 'meeting', id: m.id, date: m.meeting_date, title: m.title || '(제목 없음)', bullets: m.summary_bullets || [], summary: (m.summary_bullets || []).join(' / '), center: m.center }));
  const b = (calls || []).map(c => ({ type: 'call', id: c.id, date: (c.call_datetime || '').slice(0, 10), title: c.counterpart_name ? `통화 · ${c.counterpart_name}` : '통화기록', bullets: c.summary_bullets || [], summary: (c.summary_bullets || []).join(' / '), center: c.center }));
  const d = (reports || []).map(r => ({ type: 'report', id: r.id, date: r.report_date, title: r.title || '보고기록', bullets: (r.summary || '').split('\n').filter(Boolean).slice(0, 5), summary: r.summary || '', center: r.center }));
  return [...a, ...b, ...d].sort((x, y) => (y.date || '').localeCompare(x.date || ''));
}
// AI 컨텍스트(buildAICtx)용 — 전체 고객사 대상 최근 회의록/통화기록 조회 (센터 필터 없음)
async function fetchAllMeetingsForAI(limit, opts) {
  const o = opts || {};
  const wantMeetings = o.includeMeetings !== false;
  const wantCalls = o.includeCalls !== false;
  const [meetings, calls] = await Promise.all([
    // [수정] summary/key_points는 구버전 컬럼(비어있음) — 실제 요약은 summary_bullets에 저장됨
    wantMeetings ? sbGet(`${SB_URL}/rest/v1/mt_meetings?select=title,meeting_date,summary_bullets,center&status=eq.done&order=meeting_date.desc&limit=${limit || 100}`) : [],
    wantCalls ? sbGet(`${SB_URL}/rest/v1/mt_calls?select=counterpart_name,call_datetime,summary_bullets,center&status=eq.done&order=call_datetime.desc&limit=${limit || 100}`) : [],
  ]);
  const a = (meetings || []).map(m => ({ date: m.meeting_date, text: `[${m.center || '미지정'}] ${m.title || ''} — ${(m.summary_bullets || []).join('/').slice(0, 150)}` }));
  const b = (calls || []).map(c => ({ date: (c.call_datetime || '').slice(0, 10), text: `[${c.center || '미지정'}] 통화(${c.counterpart_name || '상대방 미상'}) — ${(c.summary_bullets || []).join('/').slice(0, 150)}` }));
  return [...a, ...b];
}

const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

async function callAI(sys,usr,max=1000,allowCont=false){
 const msgs=Array.isArray(usr)?usr.slice():[{role:'user',content:usr}];
 const maxRounds=(allowCont&&S.aiSettings&&S.aiSettings.autocont)?3:1;
 let full='';
 for(let i=0;i<maxRounds;i++){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:msgs,max_tokens:max})});
  const d=await r.json();
  const part=d.text||'';
  full+=part;
  if(!d.continued||!part)break;
  msgs.push({role:'assistant',content:part});
  msgs.push({role:'user',content:'중복 없이, 직전에 끊긴 지점에 바로 이어서 계속 작성해줘.'});
 }
 return full;
}

function buildPLCtx() {
  if (!S.pl || !S.pl.records) return '';
  const centers = S.pl.centers || [];
  const latestYms = {};
  Object.entries(S.pl.records).forEach(([cid, byYm]) => {
    const yms = Object.keys(byYm||{}).sort();
    if (yms.length) latestYms[cid] = yms[yms.length-1];
  });
  const lines = centers.map(c => {
    const ym = latestYms[c.id];
    if (!ym) return `[${c.name}] 데이터 없음`;
    const rec = S.pl.records[c.id][ym] || {};
    return `[${c.name}] ${ym} 매출:${(rec.revenue||0).toLocaleString()}만원 센터이익:${(rec.centerProfit||0).toLocaleString()}만원 이익률:${rec.revenue?(((rec.centerProfit||0)/(rec.revenue)*100).toFixed(1)):'N/A'}%`;
  }).join('\n');
  return `\n■ 손익 현황 (최근월 센터별 요약):\n${lines||'없음'}`;
}

let muType = 'meeting', muMode = 'file', muFileText = '', muFileName = '', _muInited = false;

async function muFileSelected(files){

function text_len_kb(t){ return Math.max(1, Math.round((t||'').length/1024)) + 'KB'; }
async function muEnsureCenter(name){

    await fetch(`${SB_URL}/rest/v1/mt_centers`, { method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'resolution=merge-duplicates'}, body: JSON.stringify({name}) });
  }catch(e){}
}
async function muSubmit(){
  const center=($('mu-center')?.value||'').trim();
  const counterpart=($('mu-counterpart')?.value||'').trim();
  const date=$('mu-date')?.value || fmtDate(new Date());
  const text = muMode==='file' ? muFileText : ($('mu-paste-text')?.value||'').trim();
  const st=$('mu-status'), btn=$('mu-submit-btn');
  if(!text || text.trim().length<5){ if(st) st.textContent='⚠️ 업로드할 내용이 없습니다.'; return; }
  if(btn){ btn.disabled=true; btn.textContent='업로드 중...'; }
  if(st) st.textContent='저장 중...';
  try{
    if(center) await muEnsureCenter(center);
    if(muType==='meeting'){
      const path = `upload/${Date.now()}_${Math.random().toString(36).slice(2,8)}.txt`;
      const upRes = await fetch(`${SB_URL}/storage/v1/object/meeting-recordings/${path}`, {
        method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'text/plain;charset=utf-8'}, body:text
      });
      if(!upRes.ok) throw new Error('파일 저장 실패 ('+upRes.status+')');
      const insRes = await fetch(`${SB_URL}/rest/v1/mt_meetings`, {
        method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation'},
        body: JSON.stringify({ source:'upload', source_file_name: muFileName||'모바일 붙여넣기', storage_path: path, meeting_date: date, center: center||null, status:'uploaded' })
      });
      if(!insRes.ok) throw new Error('레코드 생성 실패 ('+insRes.status+')');
      const rows = await insRes.json(); const row = rows[0];
      if(st) st.textContent='요약 생성 중... (완료 후 PC모드 회의록 탭에서 확인)';
      fetch(`${SB_URL}/functions/v1/kkangbi-meeting`, { method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json'}, body: JSON.stringify({meeting_id: row.id}) }).catch(()=>{});
    } else {
      let callStoragePath = null;
      try {
        const callPath = `calls/${Date.now()}_${Math.random().toString(36).slice(2,8)}.txt`;
        const callUpRes = await fetch(`${SB_URL}/storage/v1/object/meeting-recordings/${callPath}`, {
          method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'text/plain;charset=utf-8'}, body:text
        });
        if(callUpRes.ok) callStoragePath = callPath;
      }catch(e){ console.error('통화 원본 저장 실패(다운로드 기능만 영향):', e); }
      const insRes = await fetch(`${SB_URL}/rest/v1/mt_calls`, {
        method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation'},
        body: JSON.stringify({ center: center||null, counterpart_name: counterpart||null, call_datetime: new Date(date).toISOString(), content:text, storage_path: callStoragePath, status:'draft' })
      });
      if(!insRes.ok) throw new Error('레코드 생성 실패 ('+insRes.status+')');
      const rows = await insRes.json(); const row = rows[0];
      if(st) st.textContent='요약 생성 중... (완료 후 PC모드 회의록 탭에서 확인)';
      fetch(`${SB_URL}/functions/v1/kkangbi-call`, { method:'POST', headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json'}, body: JSON.stringify({call_id: row.id}) }).catch(()=>{});
    }
    if(st) st.textContent='✅ 업로드 완료! AI 요약이 진행 중입니다. PC모드 회의록 탭에서 결과를 확인하세요.';
    muFileText=''; muFileName='';
    const pt=$('mu-paste-text'); if(pt) pt.value='';
    const fi=$('mu-file-input'); if(fi) fi.value='';
  }catch(e){
    if(st) st.textContent='❌ 오류: '+(e.message||e);
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='업로드하고 AI 요약 시작'; }
  }
}
function openEditEvent(id){const ev=S.events.find(e=>e.id===id);if(!ev)return;modal('✏️ 일정 수정',evForm(ev),`<button class="btn-d" onclick="delEvent('${id}')">삭제</button><button class="btn-c" onclick="closeModal()">취소</button><button class="btn-p" onclick="saveEditEv('${id}')">저장</button>`);}
function saveEditEv(id){const ev=S.events.find(e=>e.id===id);if(!ev)return;Object.assign(ev,readEvForm());saveS();closeModal();render();}
function renderRoutines(c){
 let h=`<div class="scard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h4>루틴 일정 목록</h4><div style="display:flex;gap:6px"><button class="btn-o" style="font-size:10px;padding:4px 9px" onclick="aiRecommendRoutines()">🤖 루틴 추천</button><button class="add-btn" onclick="openRoutineModal()">+ 루틴 추가</button></div></div><div style="font-size:10px;color:#999;margin-bottom:8px">루틴은 양식만 저장됩니다. <b>"적용"</b> 버튼으로 기간 지정 후 일정이 생성됩니다.</div>`;
 S.routines.forEach(r=>{const dl=r.freq==='weekly'?DN[r.day]+'요일':r.freq==='monthly'?r.day+'일':r.freq==='quarterly'?'분기초':'';
  h+=`<div class="rrow"><span class="badge ${r.applied?'applied':'notapplied'}">${r.applied?'적용됨':'미적용'}</span><span style="flex:1;font-weight:500">${r.title}</span><span style="color:#ccc;font-size:10px">${FL[r.freq]||r.freq} ${dl}</span><button class="btn-g" style="font-size:9px;padding:3px 8px" onclick="openApplyRoutine('${r.id}')">📅 적용</button><button class="iBtn" onclick="openRoutineModal('${r.id}')">✏️</button><button class="iBtn" onclick="delRoutine('${r.id}')">🗑️</button></div>`;});
 if(!S.routines.length)h+=`<div style="color:#ccc;font-size:11px;padding:8px 0">등록된 루틴이 없습니다.</div>`;
 c.innerHTML=h+`</div><div id="routine-recommend-area"></div>`;}
async function aiRecommendRoutines(){
 const area=$('routine-recommend-area');area.innerHTML=`<div class="scard"><div class="loading"><div class="spin"></div>분석 중...</div></div>`;
 const freq={};S.events.forEach(e=>{freq[e.title]=(freq[e.title]||0)+1;});
 const cand=Object.entries(freq).filter(([t,n])=>n>=2&&!S.routines.find(r=>r.title===t)).sort((a,b)=>b[1]-a[1]).slice(0,10);
 if(!cand.length){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#aaa">추천할 패턴 없음</div></div>`;return;}
 try{const recs=pJSON(await callAI('JSON만 반환.',`반복 업무:\n${cand.map(([t,n])=>`- "${t}" (${n}회)`).join('\n')}\n\n루틴 추천 JSON:\n[{"title":"","freq":"weekly또는monthly","day":"","time":"","reason":""}]`,800),[]);
  if(!recs.length){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#aaa">추천 없음</div></div>`;return;}
  window._routineRecs=recs;
  area.innerHTML=`<div class="scard"><h4>🤖 AI 루틴 추천</h4>`+recs.map((r,i)=>`<div class="rrow"><span style="flex:1"><b>${r.title}</b> <span style="font-size:10px;color:#888">${FL[r.freq]||r.freq} ${r.freq==='weekly'?DN[r.day]+'요일':r.day+'일'}</span></span><span style="font-size:10px;color:#aaa;margin-right:6px">${r.reason||''}</span><button class="btn-g" style="font-size:10px;padding:3px 8px" onclick="addRecRoutine(${i})">+ 추가</button></div>`).join('')+`</div>`;
 }catch(e){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#d32f2f">오류</div></div>`;}}
function addRecRoutine(i){const r=(window._routineRecs||[])[i];if(!r)return;if(S.routines.find(x=>x.title===r.title)){showToast('이미 있습니다.');return;}S.routines.push({id:'rt_'+Date.now(),title:r.title,freq:r.freq||'monthly',day:String(r.day||'1'),time:r.time||'',applied:false});saveS();render();}
function openApplyRoutine(id){const r=S.routines.find(x=>x.id===id);if(!r)return;const ey=new Date();ey.setMonth(ey.getMonth()+3);
 modal(`📅 "${r.title}" 루틴 적용`,`<label>시작일</label><input type="date" id="ap-s" value="${fmtDate(new Date())}"><label>종료일</label><input type="date" id="ap-e" value="${fmtDate(ey)}"></div>`.slice(0,-6),`<button class="btn-c" onclick="closeModal()">취소</button><button class="btn-g" onclick="applyRoutine('${id}')">일정 생성</button>`);}
function applyRoutine(id){
 const r=S.routines.find(x=>x.id===id);if(!r)return;const sd=V('ap-s'),ed=V('ap-e');if(!sd||!ed){showToast('날짜 입력.');return;}
 let created=0;
 for(let d=new Date(sd);d<=new Date(ed);d.setDate(d.getDate()+1)){
  const dow=d.getDay(),dom=d.getDate();let hit=false;
  if(r.freq==='daily')hit=dow!==0&&dow!==6;else if(r.freq==='weekly')hit=parseInt(r.day)===dow;
  else if(r.freq==='monthly')hit=parseInt(r.day)===dom;else if(r.freq==='quarterly')hit=parseInt(r.day)===dom&&[2,5,8,11].includes(d.getMonth());
  if(!hit)continue;
  let ds=fmtDate(d);if(r.freq!=='daily'&&(HOLIDAYS[ds]||dow===0||dow===6))ds=prevWorkday(ds);
  if(S.events.find(e=>e.routineId===r.id&&e.date===ds))continue;
  S.events.push(newEv({routineId:r.id,title:r.title,date:ds,time:r.time||'',type:getType({title:r.title}),order:nextOrder(ds)}));created++;}
 r.applied=true;saveS();closeModal();render();showToast(`✅ ${created}건 생성`);}

function applyRoutineEdit(){
 const p=_rEdit;if(!p)return;
 const mode=document.querySelector('input[name="redit"]:checked')?.value||'keep';
 if(mode==='keep'){closeModal();render();return;}
 const sd=V('redit-s'),ed=V('redit-e');if(!sd||!ed){showToast('기간을 입력해주세요.');return;}
 const chkTitle=$('redit-chk-title')?.checked,chkDay=$('redit-chk-day')?.checked,exDone=$('redit-chk-done')?.checked;
 let cnt=0;
 S.events.filter(e=>e.routineId===p.id&&e.date>=sd&&e.date<=ed).forEach(ev=>{
  if(exDone&&ev.status==='done')return;
  if(chkTitle)ev.title=p.newTitle;
  if(chkDay){
   const d=new Date(ev.date);
   if(p.newFreq==='weekly'){d.setDate(d.getDate()+(parseInt(p.newDay)-d.getDay()));let nd=fmtDate(d);if(HOLIDAYS[nd]||d.getDay()===0||d.getDay()===6)nd=prevWorkday(nd);ev.date=nd;}
   else if(p.newFreq==='monthly'||p.newFreq==='quarterly'){d.setDate(parseInt(p.newDay));let nd=fmtDate(d);if(HOLIDAYS[nd]||d.getDay()===0||d.getDay()===6)nd=prevWorkday(nd);ev.date=nd;}
  }
  if(p.newTime)ev.time=p.newTime;cnt++;});
 _rEdit=null;saveS();closeModal();render();showToast(`✅ ${cnt}건 수정 완료`);}

function delRoutine(id){
 const r=S.routines.find(x=>x.id===id);if(!r)return;
 const linked=S.events.filter(e=>e.routineId===id&&e.status!=='done');
 const today=fmtDate(new Date()),ey=new Date();ey.setMonth(ey.getMonth()+3);
 showModal(`<div class="modal" style="width:460px"><button class="xbtn" onclick="closeModal()">×</button><h3>🗑️ "${esc(r.title)}" 루틴 삭제</h3>
<div style="font-size:11px;color:#aaa;margin-bottom:12px">연결된 미완료 일정 <b style="color:#e65100">${linked.length}건</b>을 어떻게 처리할까요?</div>

function execDelRoutine(id){
 const mode=document.querySelector('input[name="rdel"]:checked')?.value||'keep';
 const today=fmtDate(new Date());const before=S.events.length;
 if(mode==='range'){
  const sd=V('rdel-s'),ed=V('rdel-e');if(!sd||!ed){showToast('기간을 입력해주세요.');return;}
  const exDone=$('rdel-chk-done')?.checked;
  S.events=S.events.filter(e=>{if(e.routineId!==id)return true;if(e.date<sd||e.date>ed)return true;if(exDone&&e.status==='done')return true;return false;});
 } else if(mode==='future'){
  S.events=S.events.filter(e=>!(e.routineId===id&&e.date>=today&&e.status!=='done'));
 }
 const cnt=before-S.events.length;
 S.routines=S.routines.filter(r=>r.id!==id);
 saveS();closeModal();render();
 showToast(cnt>0?`✅ 루틴 삭제 완료 (일정 ${cnt}건 함께 삭제)`:'✅ 루틴 양식 삭제 완료');}

function saveContactInline(clientId,contactId){
 const cl=S.clients.find(x=>x.id===clientId);if(!cl)return;
 if(!cl.contacts)cl.contacts=[];
 const uid=contactId||'new';
 const keys=['name','position','job','dept','age','address','phone','gender','school','married','children','note'];
 const data={}; keys.forEach(k=>{const el=$('ctf-'+uid+'-'+k);data[k]=el?el.value.trim():'';});
 if(!data.name){showToast('성명을 입력해주세요.');return;}
 if(contactId){
  const idx=cl.contacts.findIndex(x=>x.id===contactId);
  if(idx>-1)cl.contacts[idx]={...cl.contacts[idx],...data};
 }else{
  cl.contacts.push({id:'ct_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),...data});
 }
 saveS();
 _clAddOpen[clientId]=false; _clEditId[clientId]=null;
 render();
 showToast('담당자 정보가 저장됐습니다.');
}

let _clMeetingCache={}, _clShowExcluded={}, _clTimelineExpanded={};
function toggleTimelineItem(id,key){
 _clTimelineExpanded[id]=_clTimelineExpanded[id]||new Set();
 if(_clTimelineExpanded[id].has(key))_clTimelineExpanded[id].delete(key);else _clTimelineExpanded[id].add(key);
 renderClientTimeline(id);
}
async function loadClientTimeline(id){
 const cl=S.clients.find(x=>x.id===id);if(!cl)return;
 const auto=await fetchClientMeetingHistory(expandClientKeywords([cl.name,...(cl.keywords||[])]));
 _clMeetingCache[id]=auto;
 renderClientTimeline(id);
}
function renderClientTimeline(id){
 const box=$('client-timeline');if(!box)return;
 const cl=S.clients.find(x=>x.id===id);if(!cl)return;
 const manual=(cl.history||[]).map((h,i)=>({type:'manual',id:String(i),date:h.date,title:'운영기록(직접입력)',bullets:[(h.text||'').split('\n')[0]],summary:h.text}));
 const auto=_clMeetingCache[id]||[];
 const excluded=new Set(cl.excludedLinks||[]);
 const visibleAuto=auto.filter(m=>!excluded.has(`${m.type}:${m.id}`));
 const hiddenAuto=auto.filter(m=>excluded.has(`${m.type}:${m.id}`));
 const all=[...manual,...visibleAuto].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
 const expanded=_clTimelineExpanded[id]||new Set();
 const iconOf=t=>t==='meeting'?'📋 회의록':t==='call'?'☎️ 통화기록':t==='report'?'🗂️ 보고기록':'📝 운영기록';

 const renderRow=(m,isExcluded)=>{
  const key=`${m.type}:${m.id}`;
  const isOpen=expanded.has(key);
  const oneLiner=(m.bullets&&m.bullets[0])||'';
  let actions='';
  if(m.type==='manual'){
   actions=`<button class="iBtn" style="font-size:10px;color:#d32f2f" onclick="event.stopPropagation();deleteHistory('${id}',${m.id})">삭제</button>`;
  }else if(isExcluded){
   actions=`<button class="iBtn" style="font-size:10px;color:#00A5FF" onclick="event.stopPropagation();restoreClientMeetingLink('${id}','${key}')">↩️ 복원</button>`;
  }else{
   actions=`<button class="iBtn" style="font-size:10px;color:#00A5FF" onclick="event.stopPropagation();importMeetingToHistory('${id}','${key}')">📥 히스토리에 저장</button>
            <button class="iBtn" style="font-size:10px;color:#d32f2f" onclick="event.stopPropagation();excludeClientMeetingLink('${id}','${key}')">제외</button>`;
  }
  return `<div class="history-item" style="cursor:pointer;border-left:3px solid ${isExcluded?'#ccc':'#00A5FF'};padding-left:8px;opacity:${isExcluded?'0.55':'1'}" onclick="toggleTimelineItem('${id}','${key.replace(/'/g,"\\'")}')">
   <div class="history-date">${m.date||'날짜 미상'} · ${iconOf(m.type)} ${isOpen?'▾':'▸'}</div>
   <div style="font-weight:600;font-size:11px;margin:2px 0">${esc(m.title||'')}</div>
   ${oneLiner?`<div style="font-size:11px;color:#666;margin-top:2px">${esc(oneLiner)}</div>`:''}
   ${isOpen?`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #eee;font-size:11px;color:#555;white-space:pre-wrap">${esc(m.summary||oneLiner||'내용 없음')}</div>`:''}
   ${isOpen?`<div style="display:flex;gap:10px;margin-top:6px">${actions}</div>`:''}
  </div>`;
 };

 let html=all.length?all.map(m=>renderRow(m,false)).join(''):'<div class="empty-msg">기록이 없습니다.</div>';
 if(hiddenAuto.length){
  html+=`<div style="margin-top:8px"><button class="iBtn" style="font-size:10px;color:#888" onclick="toggleShowExcluded('${id}')">${_clShowExcluded[id]?'▲ 제외한 항목 숨기기':`▼ 제외한 항목 보기 (${hiddenAuto.length}건)`}</button></div>`;
  if(_clShowExcluded[id]) html+=hiddenAuto.map(m=>renderRow(m,true)).join('');
 }
 box.innerHTML=html;
}

function saveContact(clientId,contactId){
 const cl=S.clients.find(x=>x.id===clientId);if(!cl)return;
 if(!cl.contacts)cl.contacts=[];
 const keys=['name','position','job','dept','age','address','phone','gender','school','married','children','note'];
 const data={}; keys.forEach(k=>data[k]=V('ct-'+k));
 if(!data.name){showToast('성명을 입력해주세요.');return;}
 if(contactId){
  const idx=cl.contacts.findIndex(x=>x.id===contactId);
  if(idx>-1)cl.contacts[idx]={...cl.contacts[idx],...data};
 }else{
  cl.contacts.push({id:'ct_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),...data});
 }
 saveS();closeModal();render();

function toggleVoice(){_isListening?stopVoice():startVoice();}
function startVoice(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){showToast('이 브라우저는 음성 인식을 지원하지 않아요.');return;}
 _recognition=new SR();Object.assign(_recognition,{lang:'ko-KR',continuous:false,interimResults:true,maxAlternatives:3});
 const btn=$('voice-btn');
 _recognition.onstart=()=>{_isListening=true;btn.classList.add('listening');btn.textContent='⏹';};
 _recognition.onresult=e=>{
  let fin='',inter='';
  for(let i=e.resultIndex;i<e.results.length;i++){const res=e.results[i];
   if(res.isFinal){let best=res[0].transcript;for(let j=0;j<res.length;j++){if(VOICE_TRIGGERS.some(t=>res[j].transcript.includes(t))){best=res[j].transcript;break;}}fin+=best;}
   else inter+=res[0].transcript;}
  const inp=$('qi-bar');if(inp)inp.value=fin||inter;
  if(fin&&VOICE_TRIGGERS.some(t=>fin.includes(t))){let clean=fin;VOICE_TRIGGERS.forEach(t=>{clean=clean.replace(new RegExp(t,'g'),'');});if(inp)inp.value=clean.trim();stopVoice();setTimeout(runQuickBar,300);}};
 _recognition.onerror=e=>{stopVoice();if(e.error==='not-allowed')showToast('마이크 권한을 허용해주세요.');else if(e.error==='no-speech')showToast('음성이 인식되지 않았어요.');};
 _recognition.onend=stopVoice;
 try{_recognition.start();}catch(e){stopVoice();}}
function stopVoice(){_isListening=false;const btn=$('voice-btn');if(btn){btn.classList.remove('listening');btn.textContent='🎤';}if(_recognition){try{_recognition.stop();}catch(e){}}_recognition=null;}

 }
 const rows=months.map(ym=>{
  let sum=0,has=false;
  Object.values((S.pl&&S.pl.records)||{}).forEach(byYm=>{const rec=byYm&&byYm[ym];if(rec){has=true;sum+=(rec.revenue||0);}});
  return {ym,sum,has};
 }).filter(r=>r.has); // 데이터 없는 월은 생략
 return {rows,endYm};
}
function renderHomeChartSvg(){
 const {rows}=homeRevenueSeries();
 if(!rows.length){
  return `<div style="height:150px;display:flex;align-items:center;justify-content:center;color:#666;font-size:12px">표시할 매출 데이터가 없습니다</div><div style="font-size:22px;font-weight:600;color:#f5f5f7;margin-top:4px">- <span style="font-size:12px;color:#86868b;font-weight:400">데이터 없음</span></div>`;
 }
 const totals=rows.map(r=>r.sum);
 const W=340,H=150,padL=8,padR=8,padT=14,padB=22;
 const max=Math.max(...totals,1),min=0;
 const stepX=(W-padL-padR)/Math.max(totals.length-1,1);
 const yOf=v=>H-padB-((v-min)/(max-min||1))*(H-padT-padB);
 const pts=totals.map((v,i)=>[padL+i*stepX,yOf(v)]);
 const path=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
 const areaPath=path+` L${pts[pts.length-1][0].toFixed(1)},${H-padB} L${pts[0][0].toFixed(1)},${H-padB} Z`;
 const lastVal=totals[totals.length-1]||0;
 const dots=pts.map((p)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#FE2E36"/>`).join('');
 const xLabels=rows.map((r,i)=>`<text x="${pts[i][0].toFixed(1)}" y="${H-6}" font-size="9" fill="#86868b" text-anchor="middle">${r.ym.slice(5)}월</text>`).join('');
 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:150px">
  <defs><linearGradient id="homeRevGrad" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0%" stop-color="#FE2E36" stop-opacity="0.35"/>
   <stop offset="100%" stop-color="#FE2E36" stop-opacity="0"/>
  </linearGradient></defs>
  <path d="${areaPath}" fill="url(#homeRevGrad)"/>
  <path d="${path}" fill="none" stroke="#FE2E36" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  ${dots}
  ${xLabels}
 </svg>
 <div style="font-size:22px;font-weight:600;color:#f5f5f7;margin-top:4px">${(lastVal/10000).toFixed(1)}억원 <span style="font-size:12px;color:#86868b;font-weight:400">${rows[rows.length-1].ym} 매출</span></div>`;
}

let _meetingBundleLoading = null;
function loadMeetingApp(containerEl) {
  if (!containerEl) return;

  function doMount() {
    window.KkangbiMeeting.mount(containerEl, { sbUrl: SB_URL, sbKey: SB_KEY });
  }

  if (window.KkangbiMeeting) {
    doMount();
    return;
  }

  if (!_meetingBundleLoading) {
    _meetingBundleLoading = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = '/kkangbi-meeting.bundle.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  _meetingBundleLoading
    .then(doMount)
    .catch(() => {
      containerEl.innerHTML = '<div style="padding:24px;color:#d32f2f;font-size:13px">회의록 모듈을 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.</div>';
    });
}

function loadReportApp(containerEl) {
  if (!containerEl) return;

  const tpl = document.getElementById('report-tpl');
  shadow.appendChild(tpl.content.cloneNode(true));
  try {
    initReportApp(shadow);
  } catch (e) {
    console.error('[보고서 앱 초기화 실패]', e);

  }
}

function initReportApp(root){
  const $ = (id) => root.getElementById(id);
  const fmt = (n) => (n===null||n===undefined||n===''||isNaN(n)) ? '-' : Number(n).toLocaleString('ko-KR');
  const fmt1 = (n) => (n===null||n===undefined||n===''||isNaN(n)) ? '-' : Number(n).toFixed(1);
  const uid = () => 'c_' + Math.random().toString(36).slice(2,10);

  function toast(msg){
    const t = $('rt-toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }

  function prevMonth(ym){
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-2, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  function monthLabel(ym){ const [y,m]=ym.split('-'); return `${y}년 ${Number(m)}월`; }
  function lastDay(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
  function round10(supply){ return Math.round((supply||0) * 0.1); }

  // ---------- 공휴일 / 지급일 자동계산 ----------
  const KR_HOLIDAYS_2026 = [
    '2026-01-01', // 신정
    '2026-02-16','2026-02-17','2026-02-18', // 설날 연휴
    '2026-03-01','2026-03-02', // 삼일절 + 대체공휴일
    '2026-05-01', // 노동절
    '2026-05-05', // 어린이날
    '2026-05-24','2026-05-25', // 부처님오신날 + 대체공휴일
    '2026-06-03', // 지방선거(임시공휴일)
    '2026-06-06', // 현충일
    '2026-07-17', // 제헌절
    '2026-08-15','2026-08-17', // 광복절 + 대체공휴일
    '2026-09-24','2026-09-25','2026-09-26', // 추석 연휴
    '2026-10-03','2026-10-05', // 개천절 + 대체공휴일
    '2026-10-09', // 한글날
    '2026-12-25', // 성탄절
  ];
  function isHoliday(dateObj){
    const dow = dateObj.getDay(); // 0=일,6=토
    if(dow===0 || dow===6) return true;
    const ds = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
    return KR_HOLIDAYS_2026.includes(ds);
  }
  // 매월 지정일(기본 10일)이 공휴일/주말이면 하루씩 앞으로 당겨 영업일을 반환
  function computePayDate(ym, targetDay){
    const [y,m] = ym.split('-').map(Number);
    let d = new Date(y, m-1, targetDay||10);
    while(isHoliday(d)){
      d.setDate(d.getDate()-1);
    }
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // ---------- 범용 주기(월/분기/반기/연간) 유틸 ----------
  function defaultPeriodId(periodType){
    const now = new Date();
    const y = now.getFullYear();
    if(periodType==='quarter') return `${y}-Q${Math.floor(now.getMonth()/3)+1}`;
    if(periodType==='half') return `${y}-H${now.getMonth()<6?1:2}`;
    if(periodType==='year') return `${y}`;
    return `${y}-${String(now.getMonth()+1).padStart(2,'0')}`; // month
  }
  function periodShift(periodType, id, delta){
    if(periodType==='quarter'){
      let [y,q] = id.split('-Q').map(Number);
      q += delta; while(q<1){q+=4;y--;} while(q>4){q-=4;y++;}
      return `${y}-Q${q}`;
    }
    if(periodType==='half'){
      let [y,h] = id.split('-H').map(Number);
      h += delta; while(h<1){h+=2;y--;} while(h>2){h-=2;y++;}
      return `${y}-H${h}`;
    }
    if(periodType==='year') return String(Number(id)+delta);
    const [y,m] = id.split('-').map(Number);
    const d = new Date(y, m-1+delta, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  function periodLabel(periodType, id){
    if(periodType==='quarter'){ const [y,q]=id.split('-Q'); return `${y}년 ${q}분기`; }
    if(periodType==='half'){ const [y,h]=id.split('-H'); return `${y}년 ${h==='1'?'상반기':'하반기'}`; }
    if(periodType==='year') return `${id}년`;
    return monthLabel(id);
  }
  function periodDateRangeText(periodType, id){
    if(periodType==='quarter'){
      const [y,q] = id.split('-Q').map(Number);
      const startM = (q-1)*3;
      const start = new Date(y, startM, 1), end = new Date(y, startM+3, 0);
      return `${y}. ${startM+1}. 1. ~ ${y}. ${end.getMonth()+1}. ${end.getDate()}. (${y}년 ${q}분기)`;
    }
    if(periodType==='half'){
      const [y,h] = id.split('-H').map(Number);
      const startM = h===1?0:6;
      const end = new Date(y, startM+6, 0);
      return `${y}. ${startM+1}. 1. ~ ${y}. ${end.getMonth()+1}. ${end.getDate()}. (${y}년 ${h===1?'상반기':'하반기'})`;
    }
    if(periodType==='year'){
      return `${id}. 1. 1. ~ ${id}. 12. 31.`;
    }
    const [y,m] = id.split('-').map(Number);
    return `${y}. ${m}. 1. ~ ${y}. ${m}. ${lastDay(id)}.`;
  }
  function arrowSpan(diff, unit, decimals){
    if(diff===null||diff===undefined||isNaN(diff)) return '<span class="rt-arrow-flat">-</span>';
    const val = decimals ? Math.abs(diff).toFixed(decimals) : fmt(Math.abs(diff));
    if(diff>0) return `<span class="rt-arrow-up">▲ ${val}${unit}</span>`;
    if(diff<0) return `<span class="rt-arrow-down">▼ ${val}${unit}</span>`;
    return `<span class="rt-arrow-flat">- (동일)</span>`;
  }
  function signedFmt(diff){
    if(diff===null||diff===undefined||isNaN(diff)) return '-';
    if(diff===0) return '-';
    return (diff>0?'+':'') + fmt(diff);
  }

  async function copyTableAsHtml(el, btnEl){
    if(!el){ toast('복사할 표를 찾을 수 없습니다.'); return; }
    const tableEl = el.tagName==='TABLE' ? el : el.querySelector('table');
    if(!tableEl){ toast('복사할 표를 찾을 수 없습니다.'); return; }
    const orig = btnEl ? btnEl.textContent : null;
    if(btnEl){ btnEl.textContent='복사 중...'; btnEl.disabled=true; }
    try{
      const clone = tableEl.cloneNode(true);
      // 레이아웃 관련 속성만 화면 그대로 유지(테두리/여백/굵기/행 배경) — 정렬은 아래 고정값으로 통일
      const PROPS = ['border-top','border-right','border-bottom','border-left','padding','font-weight','vertical-align','background-color'];
      // 복사본에는 항상 아래 값으로 고정(미리보기 화면 자체는 변경하지 않음)
      const FIXED_FONT = "font-family:'맑은 고딕','Malgun Gothic',Arial,sans-serif;font-size:12pt;color:#000000;text-align:center;";
      const HEADER_BG = 'background-color:#D9D9D9;';
      const srcCells = tableEl.querySelectorAll('th,td');
      const dstCells = clone.querySelectorAll('th,td');
      srcCells.forEach((src,i)=>{
        const cs = getComputedStyle(src);
        const decls = PROPS.map(p=>`${p}:${cs.getPropertyValue(p)}`).join(';');
        const isHeader = dstCells[i].tagName==='TH';
        dstCells[i].setAttribute('style', decls+';'+FIXED_FONT+(isHeader?HEADER_BG:''));
      });
      clone.setAttribute('style','border-collapse:collapse;width:100%;'+FIXED_FONT);

      // 워드/한글이 "원본 서식 유지"로 인식하도록 오피스 클립보드 관례 마커 포함
      const html = `<html><head><meta charset="utf-8"></head><body><!--StartFragment-->${clone.outerHTML}<!--EndFragment--></body></html>`;
      const plain = Array.from(tableEl.rows).map(r=>Array.from(r.cells).map(c=>c.innerText).join('\t')).join('\n');

      if(!navigator.clipboard || !window.ClipboardItem) throw new Error('클립보드 API 미지원 브라우저');
      await navigator.clipboard.write([ new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([plain], {type:'text/plain'})
      })]);
      toast('표를 복사했습니다. 이메일·한글·워드에 붙여넣기(Ctrl+V) 해주세요.');
    }catch(e){
      toast('복사 실패: '+e.message+' (브라우저 클립보드 권한을 확인해주세요)');
    }finally{
      if(btnEl){ btnEl.textContent=orig; btnEl.disabled=false; }
    }
  }

  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=>res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  const AI_PROXY_URL = `${SB_URL}/functions/v1/rpt-ai-parse`;

  async function callClaudeAPI(system, content){
    if(!SB_ENABLED){
      throw new Error('AI 자동입력은 Supabase 배포 후에만 사용할 수 있습니다. (SB_KEY 미설정 — 로컬 모드에서는 직접 입력해주세요)');
    }
    const resp = await fetch(AI_PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json', apikey: SB_KEY, Authorization:`Bearer ${SB_KEY}`},
      body: JSON.stringify({ system, content })
    });
    let data;
    try{ data = await resp.json(); }catch(e){ throw new Error(`서버 응답을 읽지 못했습니다 (status ${resp.status})`); }
    if(!resp.ok || data.type==='error' || (data.error)){
      const msg = (data.error && data.error.message) ? data.error.message : `API 오류 (status ${resp.status})`;

  async function aiAutoFill(fieldsSpec, text, imageFiles){
    const fieldDesc = fieldsSpec.map(f=>`- ${f.id}: ${f.label} (숫자만 반환, 콤마·단위·% 기호 제거)`).join('\n');
    const system = `당신은 표/문서 이미지 또는 텍스트에서 실적·청구 데이터를 추출하는 도우미입니다.
아래 필드에 해당하는 "당월" 수치를 찾아 JSON 객체 하나만 출력하세요. 설명, 코드블록 표시 없이 순수 JSON만 출력합니다.
${fieldDesc}
확실하지 않으면 해당 필드는 null로 표기하세요.`;
    const content = [];
    if(imageFiles && imageFiles.length){
      for(const f of imageFiles){
        const b64 = await fileToBase64(f);
        content.push({type:'image', source:{type:'base64', media_type: f.type || 'image/png', data:b64}});
      }
    }
    content.push({type:'text', text: text && text.trim() ? text : '위 이미지(들)의 표 내용을 분석해줘.'});

    let lastErr;
    for(let attempt=0; attempt<2; attempt++){
      try{
        const data = await callClaudeAPI(system, content);
        const textBlock = (data.content||[]).find(b=>b.type==='text');
        if(!textBlock) throw new Error('빈 응답 (다시 시도해주세요)');
        const clean = textBlock.text.replace(/```json|```/g,'').trim();
        return JSON.parse(clean);
      }catch(e){
        lastErr = e;
        if(attempt===0){ await new Promise(r=>setTimeout(r,1200)); continue; } // 1회 자동 재시도
      }
    }
    throw lastErr;
  }

  // 센터 한 곳의 모든 모듈(입력/성과급/점검/보고) 이력을 하나의 배열로 수집 (검색/정렬 전 원본)
  async function collectCenterHistoryRows(center){
    const recHist = await storageList(`rec__${center.id}__`);
    const bonusHist = center.bonusEnabled ? await storageList(`bonus__${center.id}__`) : [];
    const weeklyHist = center.weeklyCheckEnabled ? await storageList(`weekly__${center.id}__`) : [];
    const reportHist = center.simpleReportEnabled ? await storageList(`report__${center.id}__`) : [];
    const eventHist = center.eventLogEnabled ? await storageList(`eventlog__${center.id}__`) : [];

    const rows = [];
    recHist.forEach(item=>{
      const ym = item.key.split('__').pop();
      let summary = center.type==='perf'
        ? `인입 ${fmt(item.value.inbound)}건 · 응대율 ${fmt1(item.value.rate)}%`
        : `공급가액 합계 ${fmt((item.value.supplies||[]).reduce((a,b)=>a+(b||0),0))}원`;
      rows.push({ centerId:center.id, centerName:center.name, module:inputTabLabel(center), sub:'input', ym, periodDisplay:monthLabel(ym), summary, updatedAt:item.value.savedAt||item.updated_at||ym, raw:item.value });
    });
    bonusHist.forEach(item=>{
      const parts = item.key.split('__'); const ym = parts.pop(); const typeId = parts.pop();
      const pt = (center.payoutTypes||[]).find(p=>p.id===typeId);
      rows.push({ centerId:center.id, centerName:center.name, module: pt?pt.label:'성과급', sub:`bonus:${typeId}`, ym, periodDisplay:monthLabel(ym), summary:`${fmt(item.value.amount)}원 · 지급일 ${item.value.paydate||'-'}`, updatedAt:item.value.savedAt||item.updated_at||ym, raw:item.value });
    });
    weeklyHist.forEach(item=>{
      const ym = item.key.split('__').pop();
      const rowsData = item.value.rows||[];
      rows.push({ centerId:center.id, centerName:center.name, module:(center.weeklyCheckConfig&&center.weeklyCheckConfig.tabLabel)||'점검입력', sub:'weekly', ym, periodDisplay:monthLabel(ym), summary:`점검 ${rowsData.length}회 · 취약인원 합계 ${rowsData.reduce((a,r)=>a+(Number(r.vuln)||0),0)}명`, updatedAt:item.value.savedAt||item.updated_at||ym, raw:item.value });
    });
    reportHist.forEach(item=>{
      const parts = item.key.split('__'); const ym = parts.pop(); const kindId = parts.pop();
      const kind = (center.simpleReportConfig&&center.simpleReportConfig.kinds||[]).find(k=>k.id===kindId);
      const pType = kind ? (kind.periodType||'month') : 'month';
      rows.push({ centerId:center.id, centerName:center.name, module: kind?(kind.tabLabel||kind.label):'보고', sub:`report:${kindId}`, ym, periodDisplay:periodLabel(pType, ym), summary:(item.value.result||'-'), updatedAt:item.value.savedAt||item.updated_at||ym, raw:item.value });
    });
    eventHist.forEach(item=>{
      const parts = item.key.split('__'); const entryId = parts.pop(); const kindId = parts.pop();
      const kind = (center.eventLogConfig&&center.eventLogConfig.kinds||[]).find(k=>k.id===kindId);
      const d = item.value.entryDate || (item.value.savedAt||'').slice(0,10);
      let summary = kind && kind.hasRows ? `${(item.value.rows||[]).length}명` : (kind ? (item.value[kind.fields[0].id]||'-') : '-');
      rows.push({ centerId:center.id, centerName:center.name, module: kind?(kind.tabLabel||kind.label):'로그', sub:`eventlog:${kindId}`, ym:entryId, periodDisplay:d||'-', summary, updatedAt:item.value.savedAt||item.updated_at||d, raw:item.value });
    });
    return rows;
  }

  function routeToHistoryRow(r){
    const center = getCenter(r.centerId);
    if(!center) return;
    if(r.sub==='input'){ inputMonth = {centerId:center.id, ym:r.ym}; }
    else if(r.sub.startsWith('bonus:')){ bonusMonth = {centerId:center.id, ym:r.ym, payoutTypeId:r.sub.slice(6)}; }
    else if(r.sub==='weekly'){ weeklyMonth = {centerId:center.id, ym:r.ym}; }
    else if(r.sub.startsWith('report:')){ reportMonth = {centerId:center.id, ym:r.ym, kindId:r.sub.slice(7)}; }
    else if(r.sub.startsWith('eventlog:')){ eventLogState = {centerId:center.id, kindId:r.sub.slice(9), entryId:r.ym}; }
    currentView = { type:'center', id:center.id, sub:r.sub };
  }
  async function deleteHistoryRow(r){
    const center = getCenter(r.centerId);
    if(!center) return;
    if(r.sub==='input') await storageDelete(`rec__${center.id}__${r.ym}`);
    else if(r.sub.startsWith('bonus:')) await storageDelete(`bonus__${center.id}__${r.sub.slice(6)}__${r.ym}`);
    else if(r.sub==='weekly') await storageDelete(`weekly__${center.id}__${r.ym}`);
    else if(r.sub.startsWith('report:')) await storageDelete(`report__${center.id}__${r.sub.slice(7)}__${r.ym}`);
    else if(r.sub.startsWith('eventlog:')) await storageDelete(`eventlog__${center.id}__${r.sub.slice(9)}__${r.ym}`);
  }

  let allViewPage = 0;
  async function renderAllView(){
    const main = $('rt-main');
    main.innerHTML = `<div class="rt-main-header"><div><h2>전체 보기</h2><div class="desc">전체 센터의 모든 이력을 저장된 순서(최신순)로 모아봅니다.</div></div></div>
      <div id="all-recent"></div>
      <div class="rt-actions" id="all-pager" style="justify-content:center;"></div>`;

    let rows = [];
    for(const c of centers){
      rows = rows.concat(await collectCenterHistoryRows(c));
    }

    const q = searchQuery.trim().toLowerCase();
    if(q){
      rows = rows.filter(r=> JSON.stringify(r.raw).toLowerCase().includes(q) || r.ym.includes(q) || r.module.toLowerCase().includes(q) || r.centerName.toLowerCase().includes(q) || (r.periodDisplay||"").toLowerCase().includes(q));
    }
    rows.sort((a,b)=> (a.updatedAt < b.updatedAt ? 1 : -1));

    const pageSize = 10;
    const totalPages = Math.max(1, Math.ceil(rows.length/pageSize));
    if(allViewPage >= totalPages) allViewPage = totalPages-1;
    if(allViewPage < 0) allViewPage = 0;
    const pageRows = rows.slice(allViewPage*pageSize, allViewPage*pageSize+pageSize);

    $('all-recent').innerHTML = pageRows.length ? pageRows.map((r,i)=>`
      <div class="rt-history-row" data-i="${i}">
        <div class="info"><b>${r.centerName}</b> · <span style="color:var(--kt-gray);font-weight:700;">${r.module}</span> · ${r.periodDisplay} · ${r.summary}</div>
        <div class="ops">
          <button class="rt-btn rt-btn-ghost rt-btn-sm" data-edit-i="${i}">수정</button>
          <button class="rt-btn rt-btn-danger rt-btn-sm" data-del-i="${i}">삭제</button>
        </div>
      </div>`).join('') : `<div class="rt-empty">${q?'검색 결과가 없습니다.':'저장된 기록이 없습니다.'}</div>`;

    $('all-pager').innerHTML = totalPages>1 ? `
      <button class="rt-btn rt-btn-ghost rt-btn-sm" id="all-prev" ${allViewPage===0?'disabled':''}>◀ 이전</button>
      <span style="font-size:12px;color:var(--sub);align-self:center;">${allViewPage+1} / ${totalPages} 페이지 (총 ${rows.length}건)</span>
      <button class="rt-btn rt-btn-ghost rt-btn-sm" id="all-next" ${allViewPage>=totalPages-1?'disabled':''}>다음 ▶</button>
    ` : (rows.length ? `<span style="font-size:12px;color:var(--sub);">총 ${rows.length}건</span>` : '');

    const prevBtn = $('all-prev'), nextBtn = $('all-next');
    if(prevBtn) prevBtn.addEventListener('click', ()=>{ allViewPage--; renderAllView(); });
    if(nextBtn) nextBtn.addEventListener('click', ()=>{ allViewPage++; renderAllView(); });

    $('all-recent').querySelectorAll('[data-edit-i]').forEach(b=>{
      b.addEventListener('click', ()=>{ routeToHistoryRow(pageRows[Number(b.dataset.editI)]); renderAll(); });
    });
    $('all-recent').querySelectorAll('[data-del-i]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        const r = pageRows[Number(b.dataset.delI)];
        if(!confirm(`${r.centerName} · ${r.periodDisplay} 기록을 삭제할까요?`)) return;
        await deleteHistoryRow(r);
        toast('삭제했습니다.');
        renderAllView();
      });
    });
  }

  async function collectAllData(){
    const recRecords = await storageList('rec__');
    const bonusRecords = await storageList('bonus__');
    const data = { version:1, exportedAt:new Date().toISOString(), centers, records:{}, bonusRecords:{} };
    recRecords.forEach(item=>{ data.records[item.key] = item.value; });
    bonusRecords.forEach(item=>{ data.bonusRecords[item.key] = item.value; });
    return data;
  }

  async function restoreFromData(data){
    if(!data || !Array.isArray(data.centers)){
      toast('올바른 백업 파일이 아닙니다.');
      return false;
    }
    const recCount = data.records ? Object.keys(data.records).length : 0;
    const bonusCount = data.bonusRecords ? Object.keys(data.bonusRecords).length : 0;
    const ok = confirm(`센터 ${data.centers.length}개, 월별 기록 ${recCount}건, 성과급 기록 ${bonusCount}건을 복원합니다.\n현재 저장된 데이터는 이 백업 내용으로 덮어써집니다. 계속하시겠습니까?`);
    if(!ok) return false;
    await storageSet('centers', data.centers);
    if(data.records){
      for(const key of Object.keys(data.records)){ await storageSet(key, data.records[key]); }
    }
    if(data.bonusRecords){
      for(const key of Object.keys(data.bonusRecords)){ await storageSet(key, data.bonusRecords[key]); }
    }
    await loadCenters();
    toast('복원이 완료되었습니다.');
    currentView = {type:'all'};
    await renderAll();
    return true;
  }

  function downloadJSON(obj, filename){
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ============================================================
  // 센터 상세 뷰

  function inputTabLabel(center){
    return center.customInputLabel || (center.type==='billing' ? '수수료청구' : '입력');
  }

  // 센터의 모든 관리 가능한 탭 목록 (전체이력 제외) — 탭관리/이름변경에서 공용으로 사용
  function getAllTabDefs(center){
    const defs = [ { key:'input', label:inputTabLabel(center), hidden:!!center.inputHidden, deletable:false } ];
    (center.payoutTypes||[]).forEach(pt=>{ defs.push({ key:`bonus:${pt.id}`, label:pt.label, hidden:!!pt.hidden, deletable:true }); });
    if(center.weeklyCheckEnabled){
      defs.push({ key:'weekly', label:(center.weeklyCheckConfig&&center.weeklyCheckConfig.tabLabel)||'점검입력', hidden:!!center.weeklyHidden, deletable:true });
    }
    if(center.simpleReportEnabled){
      ((center.simpleReportConfig&&center.simpleReportConfig.kinds)||[]).forEach(k=>{ defs.push({ key:`report:${k.id}`, label:k.tabLabel||k.label, hidden:!!k.hidden, deletable:true }); });
    }
    if(center.eventLogEnabled){
      ((center.eventLogConfig&&center.eventLogConfig.kinds)||[]).forEach(k=>{ defs.push({ key:`eventlog:${k.id}`, label:k.tabLabel||k.label, hidden:!!k.hidden, deletable:true }); });
    }
    return defs;
  }
  function renameTab(center, subKey, newLabel){
    if(!newLabel || !newLabel.trim()) return;
    newLabel = newLabel.trim();
    if(subKey==='input') center.customInputLabel = newLabel;
    else if(subKey.startsWith('bonus:')){ const pt=(center.payoutTypes||[]).find(p=>p.id===subKey.slice(6)); if(pt) pt.label=newLabel; }
    else if(subKey==='weekly'){ center.weeklyCheckConfig = center.weeklyCheckConfig||{}; center.weeklyCheckConfig.tabLabel=newLabel; }
    else if(subKey.startsWith('report:')){ const k=(center.simpleReportConfig&&center.simpleReportConfig.kinds||[]).find(x=>x.id===subKey.slice(7)); if(k) k.tabLabel=newLabel; }
    else if(subKey.startsWith('eventlog:')){ const k=(center.eventLogConfig&&center.eventLogConfig.kinds||[]).find(x=>x.id===subKey.slice(9)); if(k) k.tabLabel=newLabel; }
  }
  function setTabHidden(center, subKey, hidden){
    if(subKey==='input') center.inputHidden = hidden;
    else if(subKey.startsWith('bonus:')){ const pt=(center.payoutTypes||[]).find(p=>p.id===subKey.slice(6)); if(pt) pt.hidden=hidden; }
    else if(subKey==='weekly'){ center.weeklyHidden = hidden; }
    else if(subKey.startsWith('report:')){ const k=(center.simpleReportConfig&&center.simpleReportConfig.kinds||[]).find(x=>x.id===subKey.slice(7)); if(k) k.hidden=hidden; }
    else if(subKey.startsWith('eventlog:')){ const k=(center.eventLogConfig&&center.eventLogConfig.kinds||[]).find(x=>x.id===subKey.slice(9)); if(k) k.hidden=hidden; }
  }
  function deleteTabDef(center, subKey){
    if(subKey.startsWith('bonus:')){ center.payoutTypes = (center.payoutTypes||[]).filter(p=>p.id!==subKey.slice(6)); }
    else if(subKey==='weekly'){ center.weeklyCheckEnabled = false; }
    else if(subKey.startsWith('report:')){ if(center.simpleReportConfig) center.simpleReportConfig.kinds = (center.simpleReportConfig.kinds||[]).filter(k=>k.id!==subKey.slice(7)); }
    else if(subKey.startsWith('eventlog:')){ if(center.eventLogConfig) center.eventLogConfig.kinds = (center.eventLogConfig.kinds||[]).filter(k=>k.id!==subKey.slice(9)); }
  }

            <button type="button" class="rt-btn rt-btn-ghost rt-btn-sm" id="tabmgr-toggle-hidden" style="margin-top:10px;">숨긴 항목 보기 (${hidden.length})</button>

                </div>`).join('') || `<div class="rt-empty">숨긴 탭이 없습니다.</div>`}

            <div class="rt-actions">
              <button class="rt-btn rt-btn-ghost" id="tabmgr-close">닫기</button>
            </div>
          </div>
        </div>`;

      $('tabmgr-toggle-hidden').addEventListener('click', ()=>{ showHidden = !showHidden; render(); });
      $('tabmgr-close').addEventListener('click', async ()=>{ root.innerHTML=''; await saveCenters(); renderAll(); });
      root.querySelectorAll('.tabmgr-rename').forEach(inp=>{
        inp.addEventListener('change', ()=>{ renameTab(center, inp.dataset.key, inp.value); });
      });
      root.querySelectorAll('.tabmgr-hide').forEach(cb=>{
        cb.addEventListener('change', ()=>{ setTabHidden(center, cb.dataset.key, cb.checked); render(); });
      });
      root.querySelectorAll('.tabmgr-del').forEach(b=>{
        b.addEventListener('click', ()=>{
          if(!confirm('이 탭을 삭제할까요? 이전에 저장된 데이터는 남아있지만 탭 목록에서 완전히 제거됩니다.')) return;
          deleteTabDef(center, b.dataset.key);
          render();
        });
      });
      root.querySelectorAll('.tabmgr-unhide').forEach(cb=>{
        cb.addEventListener('change', ()=>{ if(!cb.checked) setTabHidden(center, cb.dataset.key, false); render(); });
      });
      $('tabmgr-bg').addEventListener('click', async (e)=>{ if(e.target.id==='tabmgr-bg'){ root.innerHTML=''; await saveCenters(); renderAll(); } });
    }
    render();
  }

  // ---------- 전체이력 탭 (모든 모듈 통합, 10개씩 페이지네이션) ----------
  let allHistoryPage = 0;
  async function renderCenterAllHistory(center){
    const container = $('center-sub-content');
    container.innerHTML = `<div id="allhist-list"></div><div class="rt-actions" id="allhist-pager" style="justify-content:center;"></div>`;

    let rows = await collectCenterHistoryRows(center);

    const q = searchQuery.trim().toLowerCase();
    if(q){
      rows = rows.filter(r=> JSON.stringify(r.raw).toLowerCase().includes(q) || r.ym.includes(q) || r.module.toLowerCase().includes(q) || (r.periodDisplay||"").toLowerCase().includes(q));
    }
    rows.sort((a,b)=> (a.updatedAt < b.updatedAt ? 1 : -1));

    const pageSize = 10;
    const totalPages = Math.max(1, Math.ceil(rows.length/pageSize));
    if(allHistoryPage >= totalPages) allHistoryPage = totalPages-1;
    if(allHistoryPage < 0) allHistoryPage = 0;
    const pageRows = rows.slice(allHistoryPage*pageSize, allHistoryPage*pageSize+pageSize);

    $('allhist-list').innerHTML = pageRows.length ? pageRows.map((r,i)=>`
      <div class="rt-history-row">
        <div class="info"><b>${r.periodDisplay}</b> · <span style="color:var(--kt-gray);font-weight:700;">${r.module}</span> · ${r.summary}</div>
        <div class="ops">
          <button class="rt-btn rt-btn-ghost rt-btn-sm" data-edit-i="${i}">수정</button>
          <button class="rt-btn rt-btn-danger rt-btn-sm" data-del-i="${i}">삭제</button>
        </div>
      </div>`).join('') : `<div class="rt-empty">${q?'검색 결과가 없습니다.':'저장된 기록이 없습니다.'}</div>`;

    $('allhist-pager').innerHTML = totalPages>1 ? `
      <button class="rt-btn rt-btn-ghost rt-btn-sm" id="allhist-prev" ${allHistoryPage===0?'disabled':''}>◀ 이전</button>
      <span style="font-size:12px;color:var(--sub);align-self:center;">${allHistoryPage+1} / ${totalPages} 페이지 (총 ${rows.length}건)</span>
      <button class="rt-btn rt-btn-ghost rt-btn-sm" id="allhist-next" ${allHistoryPage>=totalPages-1?'disabled':''}>다음 ▶</button>
    ` : (rows.length ? `<span style="font-size:12px;color:var(--sub);">총 ${rows.length}건</span>` : '');

    const prevBtn = $('allhist-prev'), nextBtn = $('allhist-next');
    if(prevBtn) prevBtn.addEventListener('click', ()=>{ allHistoryPage--; renderCenterAllHistory(center); });
    if(nextBtn) nextBtn.addEventListener('click', ()=>{ allHistoryPage++; renderCenterAllHistory(center); });

    container.querySelectorAll('[data-edit-i]').forEach(b=>{
      b.addEventListener('click', ()=>{ routeToHistoryRow(pageRows[Number(b.dataset.editI)]); renderAll(); });
    });
    container.querySelectorAll('[data-del-i]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        const r = pageRows[Number(b.dataset.delI)];
        if(!confirm(`${r.periodDisplay} 기록을 삭제할까요?`)) return;
        await deleteHistoryRow(r);
        toast('삭제했습니다.');
        renderCenterAllHistory(center);
      });
    });
  }
