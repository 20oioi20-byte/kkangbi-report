<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>깡비 실적 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
<script>
  // 사내망 등에서 jsdelivr CDN 접근이 막혀 엑셀 자동추출이 "라이브러리를 불러오지 못했습니다" 오류로 실패하는 경우를 대비해
  // 보조 CDN(unpkg)으로 자동 재시도한다.
  window.addEventListener('error', function(e) {
    const target = e.target || {};
    if (target.tagName === 'SCRIPT' && target.src && target.src.indexOf('xlsx.full.min.js') !== -1 && !window.XLSX && !window.__xlsxFallbackLoaded) {
      window.__xlsxFallbackLoaded = true;
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
      document.head.appendChild(s);
    }
  }, true);
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1>깡비 실적 관리</h1>
  <div class="actions" id="topbarActions"></div>
</div>

<div class="backup-panel" id="backupPanel">
  <button class="btn-outline" onclick="copyToClipboard()">클립보드로 복사</button>
  <button class="btn-outline" onclick="pasteFromClipboard()">클립보드에서 복원</button>
  <button class="btn-outline" onclick="downloadFile()">파일로 다운로드</button>
  <label class="btn-outline" style="display:inline-block;">
    파일 업로드 <input type="file" id="restoreFile" accept="application/json" style="display:none;" onchange="uploadFile(event)">
  </label>
  <span class="msg" id="backupMsg"></span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">📋 깡비서 실적관리</div>
      <div class="sidebar-subtitle">센터별 KPI·실적 자동관리</div>
      <div class="sidebar-conn"><span class="conn-dot"></span> Supabase 연결됨</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="centerSearchInput" placeholder="🔍 센터 검색" oninput="filterCenterList(this.value)">
    </div>
    <div class="section-label" id="centerListLabel">센터 목록</div>
    <div id="centerList"></div>

    <div id="sidebarCustomArea"></div>
  </aside>
  <main id="main"><div class="loading">불러오는 중...</div></main>
</div>

<script src="app.js"></script>
</body>
</html>
