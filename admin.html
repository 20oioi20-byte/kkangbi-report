        <button class="rt-btn rt-btn-primary" id="ai-fill-btn">자동 반영</button>
        <div class="rt-hint">텍스트·이미지 중 하나만 있어도 되고, 둘 다 첨부하면 함께 분석합니다.</div>
      </div>

      <div id="tpl-form"></div>

      <div class="rt-actions">
        <button class="rt-btn rt-btn-primary" id="btn-save-record">이번 달 저장</button>
        <button class="rt-btn rt-btn-ghost" id="btn-copy-preview">전체 복사</button>
        <button class="rt-btn rt-danger rt-btn-danger" id="btn-delete-record" style="display:none;">이 달 기록 삭제</button>
      </div>
      <div class="rt-section-title">복사용 미리보기</div>
      <div class="rt-copy-target" id="tpl-preview"></div>
    `;

    if($('in-taxdate')) $('in-taxdate').value = new Date().toISOString().slice(0,10);
    $('tpl-form').addEventListener('input', ()=>{ formDirty = true; });
    async function goToMonth(newYm){
      if(formDirty){ snapshotCurrentForm(); }
      inputMonth.ym = newYm;
      $('in-month').value = newYm;
      await loadAndRenderTemplate(center);
    }
    function shiftMonth(ym, delta){
      const [y,m] = ym.split('-').map(Number);
      const d = new Date(y, m-1+delta, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    $('in-month').addEventListener('change', async ()=>{ await goToMonth($('in-month').value); });
    $('in-month-prev').addEventListener('click', async ()=>{ await goToMonth(shiftMonth(inputMonth.ym, -1)); });
    $('in-month-next').addEventListener('click', async ()=>{ await goToMonth(shiftMonth(inputMonth.ym, 1)); });
    $('ai-fill-btn').addEventListener('click', ()=>runAiFill(center));
    $('btn-copy-preview').addEventListener('click', ()=>copyTableAsHtml($('tpl-preview'), $('btn-copy-preview')));
    $('tpl-preview').addEventListener('click', (e)=>{
      const btn = e.target.closest('.rt-mini-copy-btn');
      if(!btn) return;
      const section = btn.closest('.rt-copy-section');
      const table = section ? section.querySelector('table') : null;
      if(table) copyTableAsHtml(table, btn);
    });
    $('btn-save-record').addEventListener('click', ()=>saveRecord(center));
    $('btn-delete-record').addEventListener('click', ()=>deleteRecord(center));

    await loadAndRenderTemplate(center);
  }

  let currentRecord = null, currentPrevRecord = null;
  const draftCache = {}; // 세션 임시 저장 (저장 전 입력값 유지) — 새로고침 시에는 사라짐
  let formDirty = false; // 렌더 이후 사용자가 실제로 값을 바꿨는지 추적

  function draftKey(){ return `${inputMonth.centerId}|${inputMonth.ym}`; }

  // 현재 입력 폼의 모든 값을 draft로 스냅샷 (다른 달로 이동하기 직전에 호출)
  function snapshotCurrentForm(){
    if(!inputMonth || !inputMonth.centerId) return;
    const fields = {};
    root.querySelectorAll('#tpl-form input, #tpl-form textarea').forEach(el=>{
      const sel = el.id || `${el.className}::${el.dataset.id||el.dataset.idx||''}`;
      fields[sel] = el.value;
    });
    if($('in-taxdate')) fields['in-taxdate'] = $('in-taxdate').value;
    const commentEl = root.querySelector('#bill-comment');
    draftCache[draftKey()] = { fields, commentUserEdited: commentEl ? commentEl.dataset.userEdited : undefined };
  }

  // draft가 있으면 폼 렌더 직후 값 복원 (저장 안 한 입력 유지)
  function restoreDraftForm(){
    const draft = draftCache[draftKey()];
    if(!draft) return false;
    root.querySelectorAll('#tpl-form input, #tpl-form textarea').forEach(el=>{
      const sel = el.id || `${el.className}::${el.dataset.id||el.dataset.idx||''}`;
      if(draft.fields[sel] !== undefined) el.value = draft.fields[sel];
    });
    if($('in-taxdate') && draft.fields['in-taxdate']!==undefined) $('in-taxdate').value = draft.fields['in-taxdate'];
    const commentEl = root.querySelector('#bill-comment');
    if(commentEl && draft.commentUserEdited) commentEl.dataset.userEdited = draft.commentUserEdited;
    return true;
  }

  // 정확히 "전월"에 저장된 기록이 없으면, 가장 최근에 저장된 이전 기록을 찾아 전월값 기준으로 사용
  async function findMostRecentPriorRecord(centerId, ym){
    const list = await storageList(`rec__${centerId}__`); // updated_at/key 기준 내림차순 정렬됨
    for(const item of list){
      const itemYm = item.key.split('__').pop();
      if(itemYm < ym) return { ym: itemYm, value: item.value };
    }
    return null;
  }

  async function loadAndRenderTemplate(center){
    formDirty = false;
    const ym = inputMonth.ym;
    $('in-period').textContent = `청구/보고 기간: ${periodText(center, ym)}`;
    currentRecord = await storageGet(`rec__${center.id}__${ym}`);
    const exactPm = prevMonth(ym);
    let prevSourceYm = null;
    const exactPrev = await storageGet(`rec__${center.id}__${exactPm}`);
    if(exactPrev){
      currentPrevRecord = exactPrev; prevSourceYm = exactPm;
    }else{
      const found = await findMostRecentPriorRecord(center.id, ym);
      currentPrevRecord = found ? found.value : null;
      prevSourceYm = found ? found.ym : null;
    }
    const st = $('in-status');
    const hasDraft = !!draftCache[draftKey()];
    if(hasDraft){ st.className='rt-status'; st.textContent = `${monthLabel(ym)} — 저장하지 않은 입력값을 이어서 불러왔습니다.`; }
    else if(currentRecord){ st.className='rt-status'; st.textContent = `${monthLabel(ym)} 기존 저장 기록을 불러왔습니다. (수정 후 다시 저장 가능)`; }
    else if(currentPrevRecord && prevSourceYm===exactPm){ st.className='rt-status'; st.textContent = `${monthLabel(exactPm)} 데이터를 전월값으로 자동 반영했습니다.`; }
    else if(currentPrevRecord){ st.className='rt-status'; st.textContent = `전월(${monthLabel(exactPm)}) 저장 기록이 없어, 가장 최근 저장된 ${monthLabel(prevSourceYm)} 데이터를 전월값으로 자동 반영했습니다. 필요하면 직접 수정하세요.`; }
    else{ st.className='rt-status warn'; st.textContent = `이전에 저장된 데이터가 없습니다. 신규 작업이면 전월값 칸에 직접 입력해주세요.`; }
    $('btn-delete-record').style.display = currentRecord ? '' : 'none';

    if(center.type==='perf') renderPerfForm(center);
    else renderBillingForm(center);
    if(restoreDraftForm()){
      if(center.type==='perf') updatePerfPreview(center);
      else updateBillingPreview(center);
    }
  }

  // ---- 실적형(perf) 폼 ----
  function renderPerfForm(center){
    const form = $('tpl-form');
    const monthNum = Number(inputMonth.ym.split('-')[1]);
    form.innerHTML = `
      <table class="rt-table" id="perf-table">
        <thead><tr><th style="width:22%;">구분</th><th>전월 실적 (입력/수정 가능)</th><th>${monthNum}월 실적 (입력)</th><th>증감</th></tr></thead>
        <tbody>${PERF_METRICS.map(m=>`
          <tr data-id="${m.id}">
            <td class="rt-label">${m.label}</td>
            <td class="rt-num-input"><input type="number" step="any" class="perf-prev-input" data-id="${m.id}"></td>
            <td class="rt-num-input"><input type="number" step="any" class="perf-input" data-id="${m.id}"></td>
            <td class="perf-diff">-</td>
          </tr>`).join('')}</tbody>
      </table>`;
    PERF_METRICS.forEach(m=>{
      const tr = root.querySelector(`#perf-table tr[data-id="${m.id}"]`);
      const prevVal = currentPrevRecord ? currentPrevRecord[m.id] : null;
      const prevInp = tr.querySelector('.perf-prev-input');
      prevInp.value = (prevVal!==null && prevVal!==undefined) ? prevVal : '';
      prevInp.addEventListener('input', ()=>updatePerfPreview(center));
      const inp = tr.querySelector('.perf-input');
      inp.value = currentRecord && currentRecord[m.id]!==undefined && currentRecord[m.id]!==null ? currentRecord[m.id] : '';
      inp.addEventListener('input', ()=>updatePerfPreview(center));
    });
    updatePerfPreview(center);
  }
  function updatePerfPreview(center){
    const ym = inputMonth.ym;
    const monthNum = Number(ym.split('-')[1]);
    let rows = '';
    PERF_METRICS.forEach(m=>{
      const tr = root.querySelector(`#perf-table tr[data-id="${m.id}"]`);
      const cur = tr.querySelector('.perf-input').value;
      const curN = cur===''?null:Number(cur);
      const prevRaw = tr.querySelector('.perf-prev-input').value;
      const prevN = prevRaw===''?null:Number(prevRaw);
      let diffHtml = '-';
      if(curN!==null && prevN!==null){
        const diff = Math.round((curN-prevN)*10)/10;
        diffHtml = arrowSpan(diff, m.unit, m.decimals);
      }
      tr.querySelector('.perf-diff').innerHTML = diffHtml;
      rows += `<tr><td class="rt-label">${m.label}</td><td>${prevN!==null?(m.decimals?fmt1(prevN):fmt(prevN))+m.unit:'-'}</td><td>${curN!==null?(m.decimals?fmt1(curN):fmt(curN))+m.unit:'-'}</td><td>${diffHtml}</td></tr>`;
    });
    $('tpl-preview').innerHTML = `<div style="font-weight:700;margin-bottom:6px;">${center.name} — ${monthNum}월 실적</div>
      <div class="rt-copy-section">
        <div class="rt-copy-section-head"><span>${monthNum}월 운영실적표</span><button class="rt-mini-copy-btn">이 표만 복사</button></div>
        <table class="rt-table"><thead><tr><th style="width:22%;">구분</th><th>전월 실적</th><th>${monthNum}월 실적</th><th>증감</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
  }

  // ---- 청구·도급비형(billing) 폼 ----
  function renderBillingForm(center){
    const cfg = center.config;
    const form = $('tpl-form');
    let html = `<table class="rt-table" id="bill-table"><thead><tr><th style="width:30%;">구분</th><th>공급가액 (입력)</th><th>부가세 (자동 10%)</th><th>합계금액 (자동)</th></tr></thead><tbody>`;
    cfg.rowLabels.forEach((label,i)=>{
      html += `<tr data-idx="${i}"><td class="rt-label">${label}</td><td class="rt-num-input"><input type="number" class="bill-supply" data-idx="${i}"></td><td class="bill-vat" data-idx="${i}">-</td><td class="bill-total" data-idx="${i}">-</td></tr>`;
    });
    if(cfg.rowLabels.length>1){
      html += `<tr class="rt-total"><td class="rt-label">합계</td><td class="bill-sum-supply">-</td><td class="bill-sum-vat">-</td><td class="bill-sum-total">-</td></tr>`;
    }
    html += `</tbody></table>
      <div class="rt-section-title">전월 대비 비교 (전월청구는 직접 입력·수정 가능)</div>
      <table class="rt-table" id="bill-diff"><thead><tr><th style="width:26%;">구분</th>${cfg.hasContract?'<th>계약금액</th><th>계약대비</th>':''}<th>전월청구 (입력/수정)</th><th>전월대비</th></tr></thead>
      <tbody>${cfg.rowLabels.map((label,i)=>`
        <tr data-idx="${i}">
          <td class="rt-label">${label}</td>
          ${cfg.hasContract?`<td>${fmt(cfg.contractAmount)}</td><td class="bill-diff-contract" data-idx="${i}">-</td>`:''}
          <td class="rt-num-input"><input type="number" class="bill-prev" data-idx="${i}"></td>
          <td class="bill-diff-prev" data-idx="${i}">-</td>
        </tr>`).join('')}
      ${cfg.rowLabels.length>1?`<tr class="rt-total"><td class="rt-label">합계</td>${cfg.hasContract?'<td>-</td><td>-</td>':''}<td class="bill-sum-prev">-</td><td class="bill-sum-diff">-</td></tr>`:''}
      </tbody></table>`;

    if(cfg.hasAuto){
      html += `<div class="rt-section-title">${cfg.autoLabel}</div>
        <div class="rt-row">
          <div class="rt-field" style="max-width:180px;"><label>건당 단가 (원, 부가세 제외)</label><input type="number" id="bill-unitprice" value="${cfg.unitPriceDefault||0}"></div>
          <div class="rt-field" style="max-width:180px;"><label>전환건수 (건, 당월)</label><input type="number" id="bill-autocount"></div>
        </div>
        <table class="rt-table" id="bill-auto-table"><thead><tr><th style="width:30%;">구분</th><th>공급가액</th><th>부가세</th><th>합계금액</th></tr></thead>
        <tbody><tr><td class="rt-label">도급수수료</td><td class="bill-auto-supply">-</td><td class="bill-auto-vat">-</td><td class="bill-auto-total">-</td></tr></tbody></table>
        <table class="rt-table" id="bill-auto-diff"><thead><tr><th style="width:30%;">구분</th><th>전월청구 (입력/수정)</th><th>전월대비</th></tr></thead>
        <tbody><tr><td class="rt-label">${cfg.autoLabel}</td><td class="rt-num-input"><input type="number" id="bill-auto-prev"></td><td class="bill-auto-diff-cell">-</td></tr></tbody></table>`;
    }
    if(cfg.headcountEnabled){
      html = `<div class="rt-row"><div class="rt-field" style="max-width:160px;"><label>청구인원 (명)</label><input type="number" id="bill-headcount"></div></div>` + html;
    }
    html += `<div class="rt-field" style="margin-top:10px;"><label>전월 대비 문구 (자동 초안 — 필요시 수정)</label><textarea class="rt-comment" id="bill-comment"></textarea></div>`;
    form.innerHTML = html;

    // 값 채우기 (당월)
    cfg.rowLabels.forEach((_,i)=>{
      const inp = root.querySelector(`.bill-supply[data-idx="${i}"]`);
      inp.value = currentRecord && currentRecord.supplies && currentRecord.supplies[i]!==undefined ? currentRecord.supplies[i] : '';
      inp.addEventListener('input', ()=>updateBillingPreview(center));
    });
    // 값 채우기 (전월 — 자동 반영값이되 직접 수정 가능)
    cfg.rowLabels.forEach((_,i)=>{
      const prevInp = root.querySelector(`.bill-prev[data-idx="${i}"]`);
      const prevVal = currentPrevRecord && currentPrevRecord.supplies ? currentPrevRecord.supplies[i] : null;
      prevInp.value = (prevVal!==null && prevVal!==undefined) ? prevVal : '';
      prevInp.addEventListener('input', ()=>updateBillingPreview(center));
    });
    if(cfg.hasAuto){
      $('bill-autocount').value = currentRecord && currentRecord.autoCount!==undefined ? currentRecord.autoCount : '';
      $('bill-unitprice').addEventListener('input', ()=>updateBillingPreview(center));
      $('bill-autocount').addEventListener('input', ()=>updateBillingPreview(center));
      const autoPrevInp = $('bill-auto-prev');
      const prevAutoVal = currentPrevRecord ? currentPrevRecord.autoSupply : null;
      autoPrevInp.value = (prevAutoVal!==null && prevAutoVal!==undefined) ? prevAutoVal : '';
      autoPrevInp.addEventListener('input', ()=>updateBillingPreview(center));
    }
    if(cfg.headcountEnabled){
      $('bill-headcount').value = currentRecord && currentRecord.headcount!==undefined && currentRecord.headcount!==null ? currentRecord.headcount : '';
      $('bill-headcount').addEventListener('input', ()=>updateBillingPreview(center));
    }
    $('bill-comment').value = currentRecord && currentRecord.comment ? currentRecord.comment : '';
    $('bill-comment').addEventListener('input', function(){ this.dataset.userEdited='1'; });

    updateBillingPreview(center);
  }

  function updateBillingPreview(center){
    const cfg = center.config;
    const ym = inputMonth.ym;
    let sumSupply=0,sumVat=0,sumTotal=0;
    const curSupplies = [];
    cfg.rowLabels.forEach((label,i)=>{
      const inp = root.querySelector(`.bill-supply[data-idx="${i}"]`);
      const supply = inp.value===''?0:Number(inp.value);
      curSupplies.push(inp.value===''?null:supply);
      const vat = round10(supply), total = supply+vat;
      root.querySelector(`.bill-vat[data-idx="${i}"]`).textContent = inp.value===''?'-':fmt(vat);
      root.querySelector(`.bill-total[data-idx="${i}"]`).textContent = inp.value===''?'-':fmt(total);
      sumSupply+=supply; sumVat+=vat; sumTotal+=total;
    });
    if(cfg.rowLabels.length>1){
      root.querySelector('.bill-sum-supply').textContent = fmt(sumSupply);
      root.querySelector('.bill-sum-vat').textContent = fmt(sumVat);
      root.querySelector('.bill-sum-total').textContent = fmt(sumTotal);
    }

    // 전월청구 — 입력칸(직접 수정 가능) 값을 기준으로 계산
    const prevSupplies = cfg.rowLabels.map((_,i)=>{
      const v = root.querySelector(`.bill-prev[data-idx="${i}"]`).value;
      return v===''?null:Number(v);
    });
    const prevSumFinal = prevSupplies.every(v=>v!==null) ? prevSupplies.reduce((a,b)=>a+b,0) : (prevSupplies.some(v=>v!==null) ? prevSupplies.reduce((a,b)=>a+(b||0),0) : null);

    cfg.rowLabels.forEach((label,i)=>{
      const cur = curSupplies[i];
      const prev = prevSupplies[i];
      const diff = (cur!==null && prev!==null) ? cur-prev : null;
      if(cfg.hasContract){
        const cell = root.querySelector(`.bill-diff-contract[data-idx="${i}"]`);
        if(cell) cell.textContent = signedFmt(cur!==null?cur-(cfg.contractAmount||0):null);
      }
      root.querySelector(`.bill-diff-prev[data-idx="${i}"]`).textContent = signedFmt(diff);
    });
    if(cfg.rowLabels.length>1){
      const curTotalSum = curSupplies.every(v=>v!==null) ? curSupplies.reduce((a,b)=>a+b,0) : null;
      const diffTotal = (curTotalSum!==null && prevSumFinal!==null) ? curTotalSum-prevSumFinal : null;
      root.querySelector('.bill-sum-prev').textContent = prevSumFinal!==null?fmt(prevSumFinal):'-';
      root.querySelector('.bill-sum-diff').textContent = signedFmt(diffTotal);
    }

    // 자동이체
    let autoSupply=null, autoVat=null, autoTotal=null, autoPrev=null;
    if(cfg.hasAuto){
      const unitPrice = Number($('bill-unitprice').value||0);
      const count = $('bill-autocount').value===''?null:Number($('bill-autocount').value);
      autoSupply = count!==null ? unitPrice*count : null;
      autoVat = autoSupply!==null ? round10(autoSupply) : null;
      autoTotal = autoSupply!==null ? autoSupply+autoVat : null;
      root.querySelector('.bill-auto-supply').textContent = autoSupply===null?'-':fmt(autoSupply);
      root.querySelector('.bill-auto-vat').textContent = autoVat===null?'-':fmt(autoVat);
      root.querySelector('.bill-auto-total').textContent = autoTotal===null?'-':fmt(autoTotal);
      const autoPrevRaw = $('bill-auto-prev').value;
      autoPrev = autoPrevRaw===''?null:Number(autoPrevRaw);
      const autoDiff = (autoSupply!==null && autoPrev!==null) ? autoSupply-autoPrev : null;
      root.querySelector('.bill-auto-diff-cell').textContent = signedFmt(autoDiff);
    }

    // 코멘트 자동초안 — 전월청구(직접 수정한 값 포함) 기준으로 매번 재작성
    const commentEl = $('bill-comment');
    if(commentEl && !commentEl.dataset.userEdited){
      let lines = [];
      const curTotalSum = curSupplies.every(v=>v!==null) ? curSupplies.reduce((a,b)=>a+b,0) : null;
      const amtDiff = (curTotalSum!==null && prevSumFinal!==null) ? curTotalSum-prevSumFinal : null;

      if(cfg.headcountEnabled){
        const hc = $('bill-headcount').value===''?null:Number($('bill-headcount').value);
        const prevHc = currentPrevRecord ? currentPrevRecord.headcount : null;
        if(hc!==null && prevHc!==null && prevHc!==undefined){
          const hcDiff = hc-prevHc;
          const hcArrow = hcDiff>0?'▲':hcDiff<0?'▼':'-';
          const amtArrow = amtDiff===null?'':(amtDiff>0?'▲':amtDiff<0?'▼':'-');
          const amtText = amtDiff!==null ? ` (전월대비 청구금액 ${amtArrow}${fmt(Math.abs(amtDiff))}원)` : '';
          lines.push(`청구인원 : 전월 ${prevHc}명 → 당월 ${hc}명, ${hcArrow}${Math.abs(hcDiff)}명${amtText}`);
        }
      }else if(curTotalSum!==null && prevSumFinal!==null){
        const arrow = amtDiff===0?'-':(amtDiff>0?'▲':'▼');
        lines.push(`전월 청구금액 ${fmt(prevSumFinal)}원 → 당월 ${fmt(curTotalSum)}원, ${arrow}${fmt(Math.abs(amtDiff))}원`);
      }

      if(cfg.hasAuto && autoSupply!==null && autoPrev!==null){
        const count = $('bill-autocount').value===''?null:Number($('bill-autocount').value);
        const prevAutoCount = currentPrevRecord ? currentPrevRecord.autoCount : null;
        const autoAmtDiff = autoSupply-autoPrev;
        const amtArrow = autoAmtDiff===0?'-':(autoAmtDiff>0?'▲':'▼');
        if(count!==null && prevAutoCount!==null && prevAutoCount!==undefined){
          const cntDiff = count-prevAutoCount;
          const cntArrow = cntDiff>0?'▲':cntDiff<0?'▼':'-';
          lines.push(`전환건수 : 전월 ${prevAutoCount}건 → 당월 ${count}건, ${cntArrow}${Math.abs(cntDiff)}건 (전월대비 청구금액 ${amtArrow}${fmt(Math.abs(autoAmtDiff))}원)`);
        }
      }
      commentEl.value = lines.join('\n');
    }

    // 프리뷰 (읽기전용 마크업을 새로 생성 — 입력 표를 복제하지 않음)
    const hcHtml = cfg.headcountEnabled ? `청구인원 : ${$('bill-headcount').value||'-'}명 &nbsp;|&nbsp; ` : '';
    let previewRows = '';
    cfg.rowLabels.forEach((label,i)=>{

  // ---- AI 자동입력 실행 ----
  async function runAiFill(center){
    const btn = $('ai-fill-btn'); const orig = btn.textContent;
    const text = $('ai-paste').value;
    const files = $('ai-image').files;
    if(!text.trim() && (!files || !files.length)){ toast('텍스트나 이미지를 입력해주세요.'); return; }
    btn.disabled = true; btn.textContent = '분석 중...';
    try{
      let fieldsSpec;
      if(center.type==='perf'){
        fieldsSpec = PERF_METRICS.map(m=>({id:m.id, label:`${m.label}${m.unit==='%'?'(%)':''}`}));
      }else{
        fieldsSpec = center.config.rowLabels.map((label,i)=>({id:'row'+i, label: label+' 공급가액'}));
        if(center.config.hasAuto) fieldsSpec.push({id:'autoCount', label:'자동이체 전환건수'});
        if(center.config.headcountEnabled) fieldsSpec.push({id:'headcount', label:'청구인원'});
      }
      const parsed = await aiAutoFill(fieldsSpec, text, files);
      let filled = 0;
      if(center.type==='perf'){
        PERF_METRICS.forEach(m=>{
          const v = parsed[m.id];
          if(v!==null && v!==undefined && v!==''){ root.querySelector(`.perf-input[data-id="${m.id}"]`).value = v; filled++; }
        });
        updatePerfPreview(center);
      }else{
        center.config.rowLabels.forEach((_,i)=>{
          const v = parsed['row'+i];
          if(v!==null && v!==undefined && v!==''){ root.querySelector(`.bill-supply[data-idx="${i}"]`).value = v; filled++; }
        });
        if(center.config.hasAuto && parsed.autoCount!==null && parsed.autoCount!==undefined){ $('bill-autocount').value = parsed.autoCount; filled++; }
        if(center.config.headcountEnabled && parsed.headcount!==null && parsed.headcount!==undefined){ $('bill-headcount').value = parsed.headcount; filled++; }
        updateBillingPreview(center);
      }
      toast(filled>0 ? `${filled}개 값을 반영했습니다. 저장 전 확인해주세요.` : '값을 찾지 못했습니다. 직접 입력해주세요.');
    }catch(e){ console.error(e); toast('자동 인식 실패: ' + (e.message || '알 수 없는 오류') + ' — 잠시 후 다시 시도해주세요.'); }
    finally{ btn.disabled = false; btn.textContent = orig; }
  }

  // ---- 저장 / 삭제 ----
  async function saveRecord(center){
    const ym = inputMonth.ym;
    let record = {};
    if(center.type==='perf'){
      let complete = true;
      PERF_METRICS.forEach(m=>{
        const v = root.querySelector(`.perf-input[data-id="${m.id}"]`).value;
        if(v==='') complete = false;
        record[m.id] = v===''?null:Number(v);
      });
      if(!complete){ toast('모든 값을 입력한 뒤 저장하세요.'); return; }
    }else{
      const cfg = center.config;
      record.supplies = cfg.rowLabels.map((_,i)=>{
        const v = root.querySelector(`.bill-supply[data-idx="${i}"]`).value;
        return v===''?0:Number(v);
      });
      if(cfg.hasAuto){
        const unitPrice = Number($('bill-unitprice').value||0);
        const count = $('bill-autocount').value===''?0:Number($('bill-autocount').value);
        record.autoCount = count;
        record.autoSupply = unitPrice*count;
      }
      if(cfg.headcountEnabled) record.headcount = $('bill-headcount').value===''?null:Number($('bill-headcount').value);
      record.comment = $('bill-comment').value;
    }
    record.taxDate = $('in-taxdate') ? $('in-taxdate').value : null;
    record.savedAt = new Date().toISOString();
    await storageSet(`rec__${center.id}__${ym}`, record);
    delete draftCache[draftKey()];
    formDirty = false;
    toast(`${monthLabel(ym)} 기록을 저장했습니다.`);
    currentRecord = record;
    $('btn-delete-record').style.display = '';
  }
  async function deleteRecord(center){
    if(!confirm(`${monthLabel(inputMonth.ym)} 기록을 삭제할까요?`)) return;
    await storageDelete(`rec__${center.id}__${inputMonth.ym}`);
    toast('삭제했습니다.');
    currentRecord = null;
    $('btn-delete-record').style.display = 'none';
    if(center.type==='perf') renderPerfForm(center); else renderBillingForm(center);
  }

  let weeklyMonth = null; // {centerId, ym}
  function weekdaysInMonth(ym, weekday){
    const [y,m] = ym.split('-').map(Number);
    const days = [];
    const last = lastDay(ym);
    for(let d=1; d<=last; d++){
      const dt = new Date(y, m-1, d);
      if(dt.getDay()===weekday) days.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    }
    return days;
  }

  async function renderCenterSimpleReport(center, fixedKindId){

    const periodInputHtml = periodType==='month'

    async function renderFieldsAndLoad(){

      `).join('');
      kind.fields.forEach(f=>{
        const el = $('rp-f-'+f.id);
        el.value = existing && existing[f.id]!==undefined && existing[f.id]!==null ? existing[f.id] : (f.default!==undefined ? f.default : '');

      });
      $('rp-delete').style.display = existing ? '' : 'none';

    function updatePreview(){
      const kind = cfg.kinds.find(k=>k.id===reportMonth.kindId);
      const pType = kind.periodType || 'month';
      const id = reportMonth.ym;
      let ctx;
      if(pType==='month'){
        const [y,m] = id.split('-');

      }else{
        ctx = { ymLong: periodLabel(pType,id), ymShort: periodLabel(pType,id).replace(' ',''), periodText: periodDateRangeText(pType, id) };
      }
      const values = {};
      kind.fields.forEach(f=>{ values[f.id] = $('rp-f-'+f.id).value; });

    $('rp-period-prev').addEventListener('click', async ()=>{ reportMonth.ym = periodShift(periodType, reportMonth.ym, -1); await renderCenterSimpleReport(center, fixedKindId); });

      $('rp-period').addEventListener('change', async ()=>{ reportMonth.ym = $('rp-period').value; await renderFieldsAndLoad(); });

    $('rp-copy').addEventListener('click', ()=>copyText($('rp-preview').textContent));
    $('rp-save').addEventListener('click', async ()=>{
      const kind = cfg.kinds.find(k=>k.id===reportMonth.kindId);
      const rec = { savedAt: new Date().toISOString() };
      kind.fields.forEach(f=>{ rec[f.id] = $('rp-f-'+f.id).value; });
      await storageSet(`report__${center.id}__${kind.id}__${reportMonth.ym}`, rec);
      toast(`${periodLabel(periodType, reportMonth.ym)} ${kind.label} 기록을 저장했습니다.`);
      $('rp-delete').style.display = '';
    });
    $('rp-delete').addEventListener('click', async ()=>{
      const kind = cfg.kinds.find(k=>k.id===reportMonth.kindId);
      if(!confirm(`${periodLabel(periodType, reportMonth.ym)} ${kind.label} 기록을 삭제할까요?`)) return;
      await storageDelete(`report__${center.id}__${kind.id}__${reportMonth.ym}`);
      toast('삭제했습니다.');
      $('rp-delete').style.display = 'none';
    });

    await renderFieldsAndLoad();
  }

  const EVENT_LOG_PARAGRAPH = {
    'hire-request': (center, kind, v) => {
      let body = `제 목 : ${center.name} 상담사 채용 공고 협조 요청\n\n`;
      body += `2. ${center.name} 상담사 채용 공고 협조 관련 사항을 아래와 같이 전달드리며, 업무에 최선을 다하겠습니다.\n`;

    'hire-notice': (center, kind, v) => {

      body += `2. ${center.name} 상담인력 채용 관련하여 아래와 같이 보고드리며 업무에 최선을 다하겠습니다.\n`;

  let eventLogState = null; // {centerId, kindId, entryId}
  async function renderCenterEventLog(center, fixedKindId){
    const container = $('center-sub-content');
    const cfg = center.eventLogConfig || {kinds:[]};
    const kind = cfg.kinds.find(k=>k.id===fixedKindId);
    if(!kind){ container.innerHTML = `<div class="rt-empty">등록된 로그 종류를 찾을 수 없습니다.</div>`; return; }
    if(!eventLogState || eventLogState.centerId!==center.id || eventLogState.kindId!==fixedKindId){
      eventLogState = { centerId:center.id, kindId:fixedKindId, entryId:null };
    }

    container.innerHTML = `
      <div class="rt-status" id="el-mode-status">새 항목을 작성 중입니다.</div>
      <div class="rt-row" style="margin-top:10px;">
        <div class="rt-field" style="max-width:200px;"><label>작성(발생)일자</label><input type="date" id="el-entrydate"></div>
      </div>

        <div class="rt-section-title">${kind.rowsTitle||'세부 목록'}</div>
        <table class="rt-table" id="el-rows-table">
          <thead><tr>${(kind.rowFields||[]).map(f=>`<th>${f.label}</th>`).join('')}<th></th></tr></thead>

        </table>
        <button type="button" class="rt-btn rt-btn-ghost rt-btn-sm" id="el-row-add" style="margin-top:6px;">+ 행 추가</button>
      </div>
      <div class="rt-section-title">복사용 미리보기</div>
      <div class="rt-copy-target" id="el-preview" style="white-space:pre-wrap;font-size:12.8px;"></div>
      <div class="rt-actions">
        <button class="rt-btn rt-btn-primary" id="el-save">저장</button>
        <button class="rt-btn rt-btn-ghost" id="el-new">새 항목 작성</button>
        <button class="rt-btn rt-btn-ghost" id="el-copy">문단 복사</button>
        <button class="rt-btn rt-btn-danger" id="el-delete" style="display:none;">이 항목 삭제</button>

      <div class="rt-section-title">지난 기록</div>

    function renderRowsTable(rowsData){
      root.querySelector('#el-rows-table tbody').innerHTML = (rowsData||[]).map((r,i)=>`
        <tr data-i="${i}">${(kind.rowFields||[]).map(f=>`<td class="rt-num-input"><input type="text" class="el-row-f" data-field="${f.id}" data-i="${i}" value="${(r[f.id]||'').toString().replace(/"/g,'&quot;')}"></td>`).join('')}<td><button class="rt-btn rt-btn-danger rt-btn-sm el-row-del">삭제</button></td></tr>
      `).join('');
      root.querySelectorAll('.el-row-f').forEach(inp=>inp.addEventListener('input', updatePreview));
      root.querySelectorAll('.el-row-del').forEach(b=>b.addEventListener('click', ()=>{ b.closest('tr').remove(); updatePreview(); }));
    }
    function readRowsTable(){
      return [...root.querySelectorAll('#el-rows-table tbody tr')].map(tr=>{
        const obj = {};
        (kind.rowFields||[]).forEach(f=>{ obj[f.id] = tr.querySelector(`.el-row-f[data-field="${f.id}"]`).value; });
        return obj;
      });
    }

    async function loadEntry(){
      let existing = null;
      if(eventLogState.entryId){
        existing = await storageGet(`eventlog__${center.id}__${kind.id}__${eventLogState.entryId}`);
      }
      $('el-mode-status').textContent = eventLogState.entryId ? '기존 항목을 수정하고 있습니다.' : '새 항목을 작성 중입니다.';
      $('el-entrydate').value = existing && existing.entryDate ? existing.entryDate : new Date().toISOString().slice(0,10);
      $('el-fields-row').innerHTML = kind.fields.map(f=>`
        <div class="rt-field" style="max-width:240px;"><label>${f.label}</label>${f.type==='textarea'?`<textarea class="rt-comment" id="el-f-${f.id}" style="min-height:70px;"></textarea>`:`<input type="${f.type==='number'?'number':f.type==='date'?'date':'text'}" id="el-f-${f.id}">`}</div>
      `).join('');
      kind.fields.forEach(f=>{
        const el = $('el-f-'+f.id);
        el.value = existing && existing[f.id]!==undefined && existing[f.id]!==null ? existing[f.id] : (f.default!==undefined?f.default:'');
        el.addEventListener('input', updatePreview);
      });
      $('el-entrydate').addEventListener('input', updatePreview);
      if(kind.hasRows) renderRowsTable(existing ? existing.rows : []);
      $('el-delete').style.display = eventLogState.entryId ? '' : 'none';
      updatePreview();
      await renderList();

    function updatePreview(){
      const values = {};
      kind.fields.forEach(f=>{ values[f.id] = $('el-f-'+f.id).value; });
      if(kind.hasRows) values.rows = readRowsTable();
      const builder = EVENT_LOG_PARAGRAPH[kind.id];
      $('el-preview').textContent = builder ? builder(center, kind, values) : JSON.stringify(values);
    }

    async function renderList(){
      const hist = await storageList(`eventlog__${center.id}__${kind.id}__`);
      $('el-list').innerHTML = hist.length ? hist.map(item=>{
        const entryId = item.key.split('__').pop();
        const d = item.value.entryDate || (item.value.savedAt||'').slice(0,10);
        let summary = kind.hasRows ? `${(item.value.rows||[]).length}명` : (item.value[kind.fields[0].id]||'-');
        return `<div class="rt-history-row"><div class="info"><b>${d}</b> · ${summary}</div>
          <div class="ops"><button class="rt-btn rt-btn-ghost rt-btn-sm" data-edit="${entryId}">수정</button><button class="rt-btn rt-btn-danger rt-btn-sm" data-del="${entryId}">삭제</button></div></div>`;
      }).join('') : `<div class="rt-empty">저장된 기록이 없습니다.</div>`;
      $('el-list').querySelectorAll('[data-edit]').forEach(b=>{
        b.addEventListener('click', async ()=>{ eventLogState.entryId = b.dataset.edit; await loadEntry(); });
      });
      $('el-list').querySelectorAll('[data-del]').forEach(b=>{
        b.addEventListener('click', async ()=>{
          if(!confirm('이 기록을 삭제할까요?')) return;
          await storageDelete(`eventlog__${center.id}__${kind.id}__${b.dataset.del}`);
          if(eventLogState.entryId===b.dataset.del) eventLogState.entryId = null;
          toast('삭제했습니다.');
          await loadEntry();
        });
      });
    }

    $('el-new').addEventListener('click', async ()=>{ eventLogState.entryId = null; await loadEntry(); });
    $('el-copy').addEventListener('click', ()=>copyText($('el-preview').textContent));
    $('el-save').addEventListener('click', async ()=>{
      const entryId = eventLogState.entryId || ('e'+Date.now());
      const rec = { entryDate: $('el-entrydate').value, savedAt: new Date().toISOString() };
      kind.fields.forEach(f=>{ rec[f.id] = $('el-f-'+f.id).value; });
      if(kind.hasRows) rec.rows = readRowsTable();
      await storageSet(`eventlog__${center.id}__${kind.id}__${entryId}`, rec);
      eventLogState.entryId = entryId;
      toast('저장했습니다.');
      await loadEntry();
    });
    $('el-delete').addEventListener('click', async ()=>{
      if(!eventLogState.entryId) return;
      if(!confirm('이 항목을 삭제할까요?')) return;
      await storageDelete(`eventlog__${center.id}__${kind.id}__${eventLogState.entryId}`);
      eventLogState.entryId = null;
      toast('삭제했습니다.');
      await loadEntry();
    });
    if(kind.hasRows){
      $('el-row-add').addEventListener('click', ()=>{
        const rowsData = readRowsTable();
        rowsData.push({});
        renderRowsTable(rowsData);
        updatePreview();
      });
    }

    await loadEntry();
  }

    async function updateTypeHint(){

        if(hasHistory) hint += ' ⚠ 이 센터에는 저장된 기록이 있어, 유형을 바꾸면 과거 기록의 화면 표시가 맞지 않을 수 있습니다.';
      }
      $('m-type-hint').textContent = hint;
    }
    updateTypeHint();

      `).join('') || `<div class="rt-hint">등록된 지급유형이 없습니다. 아래 "+ 지급유형 추가"를 눌러주세요.</div>`;

          else if(inp.classList.contains('mp-payday')) modalPayoutTypes[i].payDay = Number(inp.value||10);
          else if(inp.classList.contains('mp-target')) modalPayoutTypes[i].targetText = inp.value;
          else if(inp.classList.contains('mp-fund')) modalPayoutTypes[i].fundText = inp.value;
          else if(inp.classList.contains('mp-budget')) modalPayoutTypes[i].budgetLine = inp.value;
          else if(inp.classList.contains('mp-headcount')) modalPayoutTypes[i].headcountEnabled = inp.checked;
        });
      });
      $('m-payout-list').querySelectorAll('.mp-del').forEach(b=>{
        b.addEventListener('click', ()=>{ modalPayoutTypes.splice(Number(b.dataset.i),1); renderPayoutList(); });
      });
    }
    renderPayoutList();
    $('m-payout-add').addEventListener('click', ()=>{
      modalPayoutTypes.push({ id:uid(), label:'새 지급유형', targetText:'{name} 소속직원', fundText:'{ymLong} 청구 금액 내 지급', budgetLine:'성과급_변동', headcountEnabled:false, payDay:10 });

    });

    $('m-save').addEventListener('click', async ()=>{

      if(!name){ toast('센터 이름을 입력하세요.'); return; }
      const type = $('m-type').value;
      if(isEdit && type!==c.type){
        const hasHistory = (await storageList(`rec__${existing.id}__`)).length > 0;
        if(hasHistory){
          const ok = confirm('이 센터에는 이미 저장된 기록이 있습니다. 유형을 바꾸면 과거 기록의 화면 표시가 맞지 않을 수 있습니다. 그래도 변경하시겠습니까?');
          if(!ok) return;
        }
      }
      let config = {};
      const bonusEnabled = $('m-bonus').checked;
      const payoutTypes = bonusEnabled ? modalPayoutTypes : [];
      const weeklyCheckEnabled = $('m-weekly').checked;
      const simpleReportEnabled = $('m-simplereport').checked;
      if(type==='billing'){
        const rowCount = Number($('m-rowcount').value);
        const rowLabels = [$('m-row0').value.trim() || '청구항목1'];
        if(rowCount===2) rowLabels.push($('m-row1').value.trim() || '청구항목2');
        config = {
          rowLabels, periodRule: $('m-period').value, headcountEnabled: $('m-headcount').checked,
          hasContract: $('m-hascontract').checked, contractAmount: $('m-contract').value?Number($('m-contract').value):null,
          hasAuto: $('m-hasauto').checked, autoLabel:'자동이체 전환 도급비', unitPriceDefault: Number($('m-unitprice').value||15800),
        };
      }
      const patch = { name, type, config, bonusEnabled, payoutTypes, weeklyCheckEnabled, simpleReportEnabled };
      patch.customInputLabel = $('m-input-label').value.trim();
      if(weeklyCheckEnabled){
        patch.weeklyCheckConfig = Object.assign({}, c.weeklyCheckConfig||DEFAULT_WEEKLY_CONFIG, { tabLabel: $('m-weekly-label') ? $('m-weekly-label').value.trim() : '점검입력' });
      }
      if(simpleReportEnabled){
        const baseCfg = c.simpleReportConfig || DEFAULT_SIMPLEREPORT_CONFIG;
        const labelInputs = [...root.querySelectorAll('.m-report-label')];
        const kinds = (baseCfg.kinds||[]).map((k,i)=>Object.assign({}, k, { tabLabel: labelInputs[i] ? labelInputs[i].value.trim() : k.label }));
        patch.simpleReportConfig = Object.assign({}, baseCfg, { kinds });
      }
      if(isEdit){
        Object.assign(existing, patch);
      }else{
        centers.push(Object.assign({ id:c.id }, patch));
      }
      await saveCenters();
      root.innerHTML = '';
      if(!isEdit){ currentView = {type:'center', id:c.id, sub:'input'}; }
      renderAll();
      toast(isEdit?'센터 설정을 저장했습니다.':'센터를 추가했습니다.');
    });
  }

  // ============================================================
  // 렌더 총괄 / 이벤트 바인딩
  // ============================================================
  async function renderAll(){
    renderSidebar();
    if(currentView.type==='all') await renderAllView();
    else if(currentView.type==='backup') renderBackupView();
    else if(currentView.type==='customize') await renderCustomizeView();
    else await renderCenterView();
  }

  $('nav-all').addEventListener('click', ()=>{ currentView = {type:'all'}; renderAll(); });
  $('nav-backup').addEventListener('click', ()=>{ currentView = {type:'backup'}; renderAll(); });
  $('btn-add-center').addEventListener('click', ()=>openCenterModal(null));
  $('btn-customize').addEventListener('click', ()=>{ currentView = {type:'customize'}; renderAll(); });
  $('side-search').addEventListener('input', ()=>{
    searchQuery = $('side-search').value;
    if(searchQuery.trim() && currentView.type!=='all'){ currentView = {type:'all'}; }
    renderAll();
  });

  (async function init(){
    await loadCenters();
    await renderAll();
  })();

}

function normAcc(s){return String(s||'').replace(/\s/g,'');}
function parseYmFromFilename(fname){
const base=String(fname||'').replace(/\.[^.]+$/,''); // 확장자 제거
let m=base.match(/(20\d{2})\s*년\s*(\d{1,2})\s*월?/);
if(!m)m=base.match(/(20\d{2})[._\-\/\s]+(\d{1,2})(?!\d)/); // 2026.01 / 2026_1 등
if(!m)m=base.match(/(20\d{2})(\d{2})(?!\d)/); // 202601
if(!m)return null;
const y=m[1];const mo=parseInt(m[2],10);
if(mo<1||mo>12)return null;
return`${y}-${String(mo).padStart(2,'0')}`;
}

let _tabDragIdx=null;
let _tabBarDragKey=null;
function tabDragStart(ev,i){_tabDragIdx=i;ev.dataTransfer.effectAllowed='move';ev.currentTarget.style.opacity='0.5';}
function tabBarDragStart(ev,key){
_tabBarDragKey=key;
ev.dataTransfer.effectAllowed='move';
ev.currentTarget.style.opacity='0.4';
ev.currentTarget.style.borderBottom='2px dashed #00A5FF';
}
function tabBarDragOver(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';ev.currentTarget.style.background='#e8f0fe';}
function tabBarDragEnd(ev){ev.currentTarget.style.opacity='1';ev.currentTarget.style.background='transparent';}
async function tabBarDrop(ev,targetKey){
ev.preventDefault();ev.currentTarget.style.background='transparent';
if(!_tabBarDragKey||_tabBarDragKey===targetKey){_tabBarDragKey=null;return;}
const order=currentTabOrder();
const from=order.indexOf(_tabBarDragKey);
const to=order.indexOf(targetKey);
if(from<0||to<0){_tabBarDragKey=null;return;}
order.splice(from,1);order.splice(to,0,_tabBarDragKey);
S.pl.tabOrder=order;
_tabBarDragKey=null;
await savePL();renderPL(document.getElementById('pl-body'));
}
function tabDragOver(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';ev.currentTarget.style.background='#eef2fc';}
function tabDropItem(ev,targetIdx){
ev.preventDefault();
const list=document.getElementById('tab-order-list');if(!list||_tabDragIdx==null)return;
const items=Array.from(list.children);
const keys=items.map(el=>el.getAttribute('data-key'));
const dragged=keys.splice(_tabDragIdx,1)[0];
const insertAt=_tabDragIdx<targetIdx?targetIdx:targetIdx;
keys.splice(insertAt,0,dragged);
keys.forEach((k,i)=>{
const el=items.find(e=>e.getAttribute('data-key')===k);
if(el){el.style.opacity='1';el.style.background='#fff';list.appendChild(el);}
});
_tabDragIdx=null;
items.forEach(el=>{el.style.background='#fff';el.style.opacity='1';});
}
function tabDrop(ev){ev.preventDefault();}

function plPredictionsHtml(){
const centers=S.pl.centers||[];
const fields=['revenue','centerProfit','hqProfit','totalProfit'];
const labels=['매출','센터이익','본부이익','전사이익'];
const months=getLast6Months();
const aggByMonth={};
months.forEach(m=>{
const t={};
fields.forEach(f=>{t[f]=centers.reduce((s,c)=>s+((S.pl.records[c.id]||{})[m]||{})[f]||0,0);});
aggByMonth[m]=t;
});
const pred={next:{},quarter:{},annual:{}};
fields.forEach(f=>{
const vals=months.map((m,i)=>({x:i,y:aggByMonth[m][f]||0})).filter(d=>d.y>0);
if(!vals.length){pred.next[f]=0;pred.quarter[f]=0;pred.annual[f]=0;return;}
const nextVal=Math.max(0,linPredict(vals,vals.length));
pred.next[f]=nextVal;
pred.quarter[f]=nextVal*3;
pred.annual[f]=nextVal*12;
});
const rows=[['익월 예측',pred.next],['분기 예측 (×3)',pred.quarter],['연간 예측 (×12)',pred.annual]];
return`<div style="overflow-x:auto"><table class="pl-tbl">
<thead><tr style="background:#f8f9fa"><th style="padding:5px 8px;text-align:left;border-bottom:1px solid #e0e0e0">구분</th>${labels.map(l=>`<th style="padding:5px 8px;text-align:right;border-bottom:1px solid #e0e0e0">${l}</th>`).join('')}</tr></thead>
<tbody>${rows.map(([label,p])=>`<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:5px 8px;color:#888">${label}</td>${fields.map(f=>`<td style="padding:5px 8px;text-align:right;color:#00A5FF;font-weight:600">${fmtMoney(Math.round(p[f]))}</td>`).join('')}</tr>`).join('')}
</tbody></table></div><div style="font-size:9px;color:#aaa;margin-top:5px">※ 최근 6개월 데이터 기반 선형 추세 예측. 데이터가 적을수록 정확도 낮음.</div>`;
}
function linPredict(data,nextX){
const n=data.length;
if(n===0)return 0;if(n===1)return data[0].y;
const sx=data.reduce((a,d)=>a+d.x,0),sy=data.reduce((a,d)=>a+d.y,0);
const sxy=data.reduce((a,d)=>a+d.x*d.y,0),sx2=data.reduce((a,d)=>a+d.x*d.x,0);
const denom=n*sx2-sx*sx;if(!denom)return sy/n;
const slope=(n*sxy-sx*sy)/denom;
const intercept=(sy-slope*sx)/n;
return intercept+slope*nextX;
}

function fmtMoney(v){if(v===''||v===null||v===undefined||isNaN(v))return'-';const eok=v/10000;if(eok===0)return'-';return eok.toFixed(2)+'억';}

function parseNum(s){
if(s==null||s==='')return 0;
let t=String(s).trim().replace(/[",\s]/g,'');
t=t.replace(/△/g,'-').replace(/\((.*)\)/,'-$1');
const v=parseFloat(t);
return isNaN(v)?0:v;
}
function simpleCsvParse(text){
const lines=text.replace(/\r\n/g,'\n').replace(/\uFEFF/g,'').split('\n').filter(l=>l.length);
const splitLine=l=>{
const out=[];let cur='';let inQ=false;
for(let i=0;i<l.length;i++){
const c=l[i];
if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
else if(c===','&&!inQ){out.push(cur);cur='';}
else cur+=c;
}
out.push(cur);return out;
};
const header=splitLine(lines[0]);
return lines.slice(1).map(l=>{
const cells=splitLine(l);const row={};
header.forEach((h,i)=>{row[h]=cells[i];});
return row;
});
}

});

}

// CSV 구조: row0=대분류헤더, row1=지표헤더, row2~=센터데이터
// 블록 내: +0 매출, +1 목표대비(=실적-목표), +3 센터이익, +5 본부이익, +8 전사이익
function rawCsvToMatrix(text){
const src=text.replace(/\r\n/g,'\n').replace(/\uFEFF/g,'');
const rows=[];let row=[];let cur='';let inQ=false;
for(let i=0;i<src.length;i++){
const c=src[i];
if(c==='"'){if(inQ&&src[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
else if(c===','&&!inQ){row.push(cur);cur='';}
else if(c==='\n'&&!inQ){row.push(cur);rows.push(row);row=[];cur='';}
else cur+=c;
}
if(cur!==''||row.length){row.push(cur);rows.push(row);}
return rows;
}
function parseProcessedPL(text,startYm){
const M=rawCsvToMatrix(text);
if(M.length<3)throw new Error('손익가공 파일 형식이 아닙니다(행 부족).');
const headerRow=M[1].map(c=>String(c||'').trim());
const salesCols=[];headerRow.forEach((h,i)=>{if(h==='매출')salesCols.push(i);});
if(salesCols.length<2)throw new Error('월별 매출 컬럼을 찾지 못했습니다.');
const monthCols=salesCols.slice(0,-1); // 마지막은 연누계
const [sy,sm]=startYm.split('-').map(Number);
const monthYms=monthCols.map((_,idx)=>{
const d=new Date(sy,sm-1+idx,1);
return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
});
const centerRows=[];
for(let r=2;r<M.length;r++){
const code=String(M[r][0]||'').trim();
if(!code)continue;
centerRows.push({rowIdx:r,code});
}
const byCenter={};
const aspFlag={};// centerName → true/false
centerRows.forEach(({rowIdx,code})=>{
const isAsp=code.startsWith('ASP_');
const baseCode=isAsp?code.slice(4):code;
const centerName=resolveCenterAlias(code)||resolveCenterAlias(baseCode)||baseCode;
aspFlag[centerName]=isAsp;
if(!byCenter[centerName])byCenter[centerName]={};
monthCols.forEach((sc,mi)=>{
const ym=monthYms[mi];
const rev=parseNum(M[rowIdx][sc]);
const goalGap=parseNum(M[rowIdx][sc+1]);// 목표대비(실적-목표)
const cProfit=parseNum(M[rowIdx][sc+3]);
const hProfit=parseNum(M[rowIdx][sc+5]);
const tProfit=parseNum(M[rowIdx][sc+8]);
const rawRev=String(M[rowIdx][sc]||'').trim();
if(rawRev===''||rawRev.toLowerCase()==='nan'||rawRev==='#VALUE!'){
if(!cProfit&&!hProfit&&!tProfit)return;
}
const target=rev-goalGap;// 목표매출 역산
if(!byCenter[centerName][ym])byCenter[centerName][ym]={revenue:0,centerProfit:0,hqProfit:0,totalProfit:0,targetRevenue:0};
const slot=byCenter[centerName][ym];
slot.revenue+=Math.round(rev/10000);
slot.centerProfit+=Math.round(cProfit/10000);
slot.hqProfit+=Math.round(hProfit/10000);
slot.totalProfit+=Math.round(tProfit/10000);
slot.targetRevenue+=Math.round(target/10000);
});
});
return{months:monthYms,byCenter,aspFlag};
}

async function confirmProcessedPLImport(){
if(!pendingProcImport)return;
const{months,byCenter,aspFlag}=pendingProcImport;
const centerNames=Object.keys(byCenter);
let savedMonths=new Set();const skipped=[];
for(let i=0;i<centerNames.length;i++){
const sel=document.getElementById('proc-center-'+i);
if(!sel)continue;
let cid=sel.value;
const cn=centerNames[i];
const isAsp=!!(aspFlag&&aspFlag[cn]);
if(cid==='__skip__')continue;
if(cid==='__new__'){
cid='plc_'+Date.now()+'_'+i;
S.pl.centers.push({id:cid,name:cn,asp:isAsp});
}else{
const ex=S.pl.centers.find(c=>c.id===cid);
if(ex&&isAsp)ex.asp=true;
}
if(!S.pl.records[cid])S.pl.records[cid]={};
months.forEach(ym=>{
const data=byCenter[cn][ym];if(!data)return;
const prevRec=S.pl.records[cid][ym]||{};
const cname=(S.pl.centers.find(c=>c.id===cid)||{}).name||cn;
if(prevRec.monthLocked){skipped.push(`${cname} ${ym}`);return;}
const locks=prevRec.locks||{revenue:false,centerProfit:false,items:{}};
S.pl.records[cid][ym]={
...prevRec,
revenue:locks.revenue?(prevRec.revenue||0):data.revenue,
centerProfit:locks.centerProfit?(prevRec.centerProfit||0):data.centerProfit,
hqProfit:data.hqProfit,
totalProfit:data.totalProfit,
targetRevenue:data.targetRevenue,
lineItems:prevRec.lineItems||null,
locks
};
savedMonths.add(ym);
});
}
pushUploadHistory({type:'processed',fname:pendingProcImport.fname,ym:`${months[0]}~${months[months.length-1]}`,centers:centerNames.join(', ')});
await savePL();
pendingProcImport=null;
alert(`손익가공 저장 완료: ${[...savedMonths].sort().join(', ')}${skipped.length?`\n🔒 월 확정으로 건너뜀: ${[...new Set(skipped)].join(', ')}`:''}`);
switchPLTab('dashboard');renderPL(document.getElementById('pl-body'));
}
function handlePLFile(ev){

const reader=new FileReader();

extractPLFromFile(b64,'pdf',file.name);
};
reader.readAsDataURL(file);

function exportPLCSV(){
const centers=S.pl.centers||[];
if(!centers.length){alert('데이터가 없습니다.');return;}
const allYMs=new Set();
centers.forEach(c=>Object.keys(S.pl.records[c.id]||{}).forEach(m=>allYMs.add(m)));
const yms=Array.from(allYMs).sort();
const rows=[['센터','연월','매출(만원)','센터이익(만원)','센터이익률(%)','본부이익(만원)','본부이익률(%)','전사이익(만원)','전사이익률(%)']];
centers.forEach(ctr=>{
yms.forEach(ym=>{
const r=(S.pl.records[ctr.id]||{})[ym]||{};
if(!r.revenue&&!r.centerProfit&&!r.hqProfit&&!r.totalProfit)return;
const cr=r.revenue?(r.centerProfit/r.revenue*100).toFixed(1):'';
const hr=r.revenue?(r.hqProfit/r.revenue*100).toFixed(1):'';
const tr=r.revenue?(r.totalProfit/r.revenue*100).toFixed(1):'';
rows.push([ctr.name,ym,r.revenue||0,r.centerProfit||0,cr,r.hqProfit||0,hr,r.totalProfit||0,tr]);
});
});
const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download=`손익데이터_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function buildDataContext(){
const centers=S.pl.centers||[];
const accIdx=buildAccMapIndexFull();
const allYMs=getAllYMs();
const toM=v=>v!=null?(v/100).toFixed(2):'0';
let ctx=`[담당 센터: ${centers.map(c=>c.name).join(', ')}]\n[데이터 보유 월: ${allYMs.join(', ')}]\n※ 금액 단위: 백만원\n\n`;
centers.forEach(c=>{
const recs=S.pl.records[c.id]||{};
const months=Object.keys(recs).sort();
if(!months.length)return;
ctx+=`■ ${c.name}${c.asp?' [ASP센터]':''}\n`;
months.forEach(ym=>{
const r=recs[ym];
ctx+=`  ${ym}: 매출 ${toM(r.revenue)}, 센터이익 ${toM(r.centerProfit)}, 본부이익 ${toM(r.hqProfit)}, 전사이익 ${toM(r.totalProfit)}`;
const tgt=getTarget(c.id,ym);
if(tgt.revenue!=null||tgt.hqProfit!=null)ctx+=` [목표-매출 ${toM(tgt.revenue)}, 본부이익 ${toM(tgt.hqProfit)}]`;
if(r.lineItems&&r.lineItems.length){
const byCat={};
r.lineItems.forEach(li=>{
const m=lookupAcc(accIdx,li.name);
const cat=m?m.category:'미분류';
if(!byCat[cat])byCat[cat]=[];
byCat[cat].push(`${li.name}:${toM(li.value)}`);
});
Object.keys(byCat).forEach(cat=>{ctx+=`\n    [${cat}] ${byCat[cat].join(' / ')}`;});
}
ctx+=`\n`;
});
const issues=S.pl.issues&&S.pl.issues[c.id];
if(issues&&Object.keys(issues).length){
ctx+=`  [부진센터사유히스토리]\n`;
Object.keys(issues).sort().slice(-6).forEach(ym=>{const h=issues[ym];ctx+=`    ${ym}: ${h.text?h.text.slice(0,150):''}\n`;});
}
});
if(S.pl.memos&&S.pl.memos.length){
ctx+=`[전체 메모 히스토리]\n`;
[...S.pl.memos].slice(-10).forEach(m=>{ctx+=`  ${new Date(m.ts).toLocaleDateString('ko-KR')}: ${m.text.slice(0,200)}\n`;});
}
return ctx;
}

function handleTargetCsv(ev){
const files=Array.from(ev.target.files||[]);ev.target.value='';
if(!files.length)return;
const resEl=document.getElementById('pl-targetcsv-result');
resEl.innerHTML=`<div class="loading" style="padding:12px"><div class="spin"></div>목표 파일을 분석하는 중입니다...</div>`;
const readFile=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res({name:f.name,text:e.target.result});r.onerror=()=>rej(new Error(f.name+' 읽기 실패'));r.readAsText(f,'utf-8');});
Promise.all(files.map(readFile)).then(loaded=>{
try{
let parsed=null;
loaded.forEach(({name,text})=>{
const p=parseTargetCsv(text,name);
if(!parsed)parsed=p;else{Object.keys(p.byCenter).forEach(cn=>{parsed.byCenter[cn]=Object.assign(parsed.byCenter[cn]||{},p.byCenter[cn]);});}
});
pendingTargetImport=parsed;
renderTargetPreview();
}catch(err){
resEl.innerHTML=`<div class="pl-err">처리 오류: ${escAttr(err.message)}</div>`;
}
}).catch(err=>{resEl.innerHTML=`<div class="pl-err">${escAttr(err.message)}</div>`;});

function parseTargetCsv(text,fname){
const M=rawCsvToMatrix(text);
if(M.length<3)throw new Error('목표 파일 형식이 아닙니다(행 부족).');
const h0=M[0].map(c=>String(c||'').trim());
const h1=M[1].map(c=>String(c||'').trim());
let revStart=-1,hqStart=-1;
h0.forEach((h,i)=>{if(h.replace(/\s/g,'').includes('매출'))revStart=i;if(h.replace(/\s/g,'').includes('본부이익'))hqStart=i;});
if(revStart<0)throw new Error('매출액 목표 열을 찾지 못했습니다.');
function monthCols(start){
const map={};
for(let i=start;i<h1.length;i++){
const mm=h1[i].match(/^(\d{1,2})월$/);
if(mm){const mo=parseInt(mm[1],10);if(mo>=1&&mo<=12&&map[mo]===undefined)map[mo]=i;}
if(i>start&&h0[i]&&h0[i].trim()&&!/^\s*$/.test(h0[i])&&i!==start)break;
}
return map;
}
const revMonthCols=monthCols(revStart);
const hqMonthCols=hqStart>=0?monthCols(hqStart):{};
const year=(fname.match(/(20\d{2})/)||[])[1]||String(new Date().getFullYear());
const byCenter={};
for(let r=2;r<M.length;r++){
const code=String(M[r][0]||'').trim();
if(!code)continue;
const isAsp=code.startsWith('ASP_');
const cName=resolveCenterAlias(code)||(isAsp?'ASP_'+resolveCenterAlias(code.slice(4)):resolveCenterAlias(code));
if(!byCenter[cName])byCenter[cName]={};
for(let mo=1;mo<=12;mo++){
const ym=`${year}-${String(mo).padStart(2,'0')}`;
const rc=revMonthCols[mo],hc=hqMonthCols[mo];
const revV=rc!=null?parseNum(M[r][rc]):0;
const hqV=hc!=null?parseNum(M[r][hc]):0;
if(revV===0&&hqV===0&&(!M[r][rc]||String(M[r][rc]).trim()==='-'))continue;
if(!byCenter[cName][ym])byCenter[cName][ym]={revenue:0,hqProfit:0};
byCenter[cName][ym].revenue+=Math.round(revV*100); // 백만원→만원
byCenter[cName][ym].hqProfit+=Math.round(hqV*100);
}
}
return{byCenter,year};
}

});

function suggestCategory(name){
const n=String(name||'').replace(/\s/g,'');
const rules=[
[/급여|급료|임금|상여|수당|퇴직|인건|복리후생|4대보험|국민연금|건강보험|고용보험|산재/,'직접인건비'],
[/임차|임대|관리비|건물|사무실/,'경비'],
[/통신|전화|회선|인터넷|전용회선/,'경비'],
[/감가상각|상각/,'경비'],
[/세금|공과|부담금/,'경비'],
[/전력|수도|전기|가스|수도광열/,'경비'],
[/소모품|비품|사무용품/,'경비'],
[/수선|수리|유지보수/,'경비'],
[/보험료/,'경비'],
[/지급수수료|수수료|용역|외주|위탁/,'경비'],
[/교육|훈련/,'간접인건비'],
[/여비|교통|출장/,'경비'],
[/광고|선전|판촉/,'경비'],
[/매출|수익|영업수익/,'매출'],
[/이익/,'이익'],
];
for(const[re,cat]of rules){if(re.test(n))return cat;}
return '경비'; // 기본 제안
}
function computeVerifyRows(ym){
const centers=S.pl.centers||[];
const accIdx=buildAccMapIndexFull();
const rows=[];
centers.forEach(c=>{
const rec=(S.pl.records[c.id]||{})[ym];
if(!rec)return;
const hasItems=rec.lineItems&&rec.lineItems.length;
let revSum=null,unclassified=0;
const unclassifiedItems=[];
if(hasItems){
revSum=0;
rec.lineItems.forEach(li=>{const m=lookupAcc(accIdx,li.name);if(!m){unclassified+=li.value;unclassifiedItems.push({name:li.name,value:li.value});return;}if(m.category==='미분류'){unclassified+=li.value;unclassifiedItems.push({name:li.name,value:li.value});}if(m.role==='revenue')revSum+=li.value;});
}
const items=[];
if(hasItems&&revSum>0){
const diff=(rec.revenue||0)-revSum;
items.push({key:'revenue',label:'매출',stored:rec.revenue||0,calc:revSum,diff,match:Math.abs(diff)<1});
}
if(unclassifiedItems.length){
items.push({key:'__unclassified__',label:'미분류 항목',stored:null,calc:unclassified,diff:unclassified,match:false,uItems:unclassifiedItems});
}
if(items.length)rows.push({cid:c.id,cName:c.name,items,hasItems});
});
return rows;
}

});

<td style="padding:3px 6px;text-align:right;color:#999;font-size:9px;background:#f4f6fc">${dsum==null?'—':fmtMoney(dsum)}</td></tr>`;
});

});
}
});
html+=`</tbody></table></div></div>`;

// 모바일 전용 JS
// ═══════════════════════════════════════
(function(){
  // 오늘 날짜 표시
  const today = new Date();
  const dayNames = ['일','월','화','수','목','금','토'];
  const el = document.getElementById('m-hdr-date');
  if(el) el.textContent = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 ${dayNames[today.getDay()]}요일`;

  // 탭 전환
  window.mSwitchTab = function(id, btn) {
    document.querySelectorAll('#mobile-app .m-tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#mobile-app .m-tab').forEach(t => t.classList.remove('active'));
    const panel = document.getElementById('m-tab-'+id);
    if(panel) panel.classList.add('active');
    if(btn) btn.classList.add('active');
  };

  // 캘린더
  let mCurY = today.getFullYear(), mCurM = today.getMonth();
  let mSelDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  function getEventDates() {
    // 실제 S 객체의 events에서 날짜 추출
    if(typeof S === 'undefined' || !S.events) return {};
    const map = {};
    S.events.forEach(e => { if(e.date) map[e.date] = true; });
    return map;
  }

  function getEventsForDate(dateStr) {
    if(typeof S === 'undefined' || !S.events) return [];
    return S.events.filter(e => e.date === dateStr);
  }

  window.mRenderCal = function() {
    const grid = document.getElementById('m-cal-grid');
    if(!grid) return;
    // 헤더 7개는 유지, 날짜 셀만 교체
    const headers = Array.from(grid.children).slice(0,7);
    grid.innerHTML = '';
    headers.forEach(h => grid.appendChild(h));

    document.getElementById('m-cal-title').textContent = `${mCurY}년 ${mCurM+1}월`;
    const first = new Date(mCurY, mCurM, 1).getDay();
    const lastDay = new Date(mCurY, mCurM+1, 0).getDate();
    const prevLast = new Date(mCurY, mCurM, 0).getDate();
    const eventDates = getEventDates();

    for(let i = first-1; i >= 0; i--) {
      const el = document.createElement('div');
      el.className = 'mcal other';
      el.textContent = prevLast - i;
      grid.appendChild(el);
    }
    for(let d = 1; d <= lastDay; d++) {
      const dateStr = `${mCurY}-${String(mCurM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el = document.createElement('div');
      let cls = 'mcal';
      if(today.getFullYear()===mCurY && today.getMonth()===mCurM && today.getDate()===d) cls += ' today';
      if(mSelDate === dateStr) cls += ' msel';
      if(eventDates[dateStr]) cls += ' dot';
      el.className = cls;
      el.textContent = d;
      el.onclick = () => mSelectDate(dateStr, d);
      grid.appendChild(el);
    }
    const total = first + lastDay;
    const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
    for(let d = 1; d <= remain; d++) {
      const el = document.createElement('div');
      el.className = 'mcal other';
      el.textContent = d;
      grid.appendChild(el);
    }
  };

  window.mSelectDate = function(dateStr, day) {
    mSelDate = dateStr;
    mRenderCal();
    mRenderEvents();
    const [y,m,d] = dateStr.split('-');
    const dow = new Date(+y,+m-1,+d).getDay();
    const isToday = today.getFullYear()==+y && today.getMonth()==+m-1 && today.getDate()==+d;
    const lbl = document.getElementById('m-sel-label');
    if(lbl) lbl.textContent = `${+m}월 ${+d}일 (${dayNames[dow]})${isToday?' · 오늘':''}`;
  };

  window.mRenderEvents = function() {
    const list = document.getElementById('m-event-list');
    if(!list) return;
    const evs = getEventsForDate(mSelDate);
    if(!evs.length) {
      list.innerHTML = '<div class="no-event">📭 이 날은 일정이 없습니다</div>';
      return;
    }
    const catColors = {work:'#00A5FF', personal:'#4ade80', report:'#f57c00', meeting:'#9c27b0'};
    list.innerHTML = evs.map(e => {
      const color = catColors[e.cat] || '#00A5FF';
      const done = e.status === 'done';
      return `<div class="m-event-item">
        <div class="ev-color" style="background:${color}"></div>
        <div class="ev-info">
          <div class="ev-title">${e.title||''}</div>
          <div class="ev-meta">${e.time?e.time+' · ':''}${e.cat||''}</div>
        </div>
        <span class="ev-status ${done?'s-done':'s-todo'}">${done?'완료':'예정'}</span>
      </div>`;
    }).join('');
  };

  window.mMoveMonth = function(dir) {
    mCurM += dir;
    if(mCurM > 11){ mCurM = 0; mCurY++; }
    if(mCurM < 0){ mCurM = 11; mCurY--; }
    mRenderCal();
  };

  // D-day 렌더
  function mRenderDday() {
    const wrap = document.getElementById('m-dday-list');
    if(!wrap) return;
    if(!S || !Array.isArray(S.events)) { wrap.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,.5)">중요 일정을 등록하면 표시됩니다</div>'; return; }
    const colors = ['linear-gradient(135deg,#d32f2f,#b71c1c)','linear-gradient(135deg,#f57c00,#e65100)','linear-gradient(135deg,#00A5FF,#0d47a1)','linear-gradient(135deg,#188038,#1b5e20)','linear-gradient(135deg,#7b1fa2,#4a148c)'];
    const todayMs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const ddays = S.events.filter(e => {
      if(e.status==='done') return false;
      const d = new Date(e.date);
      const diff = Math.round((d.getTime() - todayMs) / 86400000);
      return diff >= 0 && diff <= 60 && (e.important || e.dday || e.type==='dday');
    }).map(e => {
      const d = new Date(e.date);
      const diff = Math.round((d.getTime() - todayMs) / 86400000);
      return {...e, diff};
    }).sort((a,b) => a.diff - b.diff).slice(0,5);

    if(!ddays.length) {
      wrap.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,.5)">등록된 D-day 없음</div>';
      return;
    }
    wrap.innerHTML = ddays.map((e,i) => `
      <div class="dday-card" style="background:${colors[i%colors.length]}">
        <div class="dday-num">D-${e.diff}</div>
        <div class="dday-title">${e.title||''}</div>
        <div class="dday-date">${e.date||''}</div>
      </div>`).join('');
  }

  // 손익 테이블
  window.mRenderPL = function() {
    const sel = document.getElementById('m-center-select');
    const table = document.getElementById('m-pl-table');
    if(!sel || !table) return;

    // 센터 목록 동적 구성
    if(typeof S !== 'undefined' && S.pl && S.pl.centers) {
      const existing = Array.from(sel.options).map(o => o.value);
      S.pl.centers.forEach(c => {
        if(!existing.includes(c.id)) {
          const opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name;
          sel.appendChild(opt);
        }
      });
    }

    const centerId = sel.value;
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    // 억원 단위 포맷 함수
    const fmtAmt = v => {
      if(v === null || v === undefined) return '-';
      const amt = v / 10000;
      return (amt < 0 ? '-' : '') + Math.abs(amt).toFixed(2) + '억';
    };

    // 표시 항목 (단순 field 키만 사용)
    const rowDefs = [
      {key:'revenue',      label:'매출'},
      {key:'laborCost',    label:'인건비'},
      {key:'expense',      label:'경비'},
      {key:'centerProfit', label:'센터이익'},
      {key:'hqProfit',     label:'본부이익'},
      {key:'totalProfit',  label:'전사이익'},
    ];

    // 데이터 추출 (단순 field + lineItems 합산 둘 다 지원)
    function getVal(ym, key, cid) {
      if(!S || !S.pl || !S.pl.records) return null;

      function getOne(rec) {
        if(!rec) return null;
        // field 직접 존재
        if(rec[key] !== undefined && rec[key] !== null) return rec[key];
        // laborCost: 직접+간접인건비 합산
        if(key === 'laborCost') {
          let sum = 0, has = false;
          if(rec['직접인건비'] !== undefined){ sum += rec['직접인건비']||0; has = true; }
          if(rec['간접인건비'] !== undefined){ sum += rec['간접인건비']||0; has = true; }
          if(has) return sum;
          // lineItems에서 합산
          if(rec.lineItems && typeof categoryTotal === 'function') {
            const accIdx = typeof buildAccMapIndexFull==='function' ? buildAccMapIndexFull() : {};
            const d = (categoryTotal(rec,'직접인건비',accIdx)||0) + (categoryTotal(rec,'간접인건비',accIdx)||0);
            if(d !== 0) return d;
          }
        }
        // expense: 경비
        if(key === 'expense') {
          if(rec['경비'] !== undefined) return rec['경비'];
          if(rec.lineItems && typeof categoryTotal === 'function') {
            const accIdx = typeof buildAccMapIndexFull==='function' ? buildAccMapIndexFull() : {};
            return categoryTotal(rec,'경비',accIdx) || null;
          }
        }
        return null;
      }

      if(cid === '__all__') {
        let sum = 0, has = false;
        Object.keys(S.pl.records).forEach(id => {
          const v = getOne((S.pl.records[id]||{})[ym]);
          if(v !== null){ sum += v; has = true; }
        });
        return has ? sum : null;
      }
      return getOne((S.pl.records[cid]||{})[ym]);
    }

    // 헤더
    let html = '<thead><tr><th>항목</th>';
    months.forEach(m => { html += `<th>${m}</th>`; });
    html += '<th>합계</th><th>평균</th></tr></thead><tbody>';

    rowDefs.forEach(({key, label}) => {
      html += `<tr><td>${label}</td>`;
      const vals = months.map((_,i) => {
        const ym = `${today.getFullYear()}-${String(i+1).padStart(2,'0')}`;
        return getVal(ym, key, centerId);
      });
      const numVals = vals.filter(v => v !== null);
      const sum = numVals.reduce((a,b) => a+b, 0);
      const avg = numVals.length ? Math.round(sum/numVals.length) : 0;

      vals.forEach(v => {
        if(v === null) { html += `<td style="color:#ddd">-</td>`; return; }
        const cls = key.includes('Profit') ? (v<0?'m-bad':v>0?'m-good':'') : '';
        html += `<td class="${cls}">${fmtAmt(v)}</td>`;
      });
      const sumCls = key.includes('Profit') ? (sum<0?'m-bad':sum>0?'m-good':'') : 'm-good';
      html += `<td class="${sumCls}" style="font-weight:700">${fmtAmt(sum)}</td>`;
      html += `<td style="color:#555">${fmtAmt(avg)}</td>`;
      html += '</tr>';
    });

    // 이익률 행 추가
    // 이익률: centerProfit/revenue, 없으면 hqProfit/revenue 시도
    const rateVals = [];
    html += `<tr class="sum-row"><td>이익률</td>`;
    months.forEach((_,i) => {
      const ym = `${today.getFullYear()}-${String(i+1).padStart(2,'0')}`;
      const rev = getVal(ym,'revenue',centerId);
      const profit = getVal(ym,'centerProfit',centerId) ?? getVal(ym,'hqProfit',centerId) ?? getVal(ym,'totalProfit',centerId);
      if(!rev) { html += `<td style="color:#ddd">-</td>`; return; }
      if(profit === null || profit === undefined) { html += `<td style="color:#ddd">-</td>`; return; }
      const rate = (profit/rev*100);
      rateVals.push(rate);
      const rateTxt = rate.toFixed(1)+'%';
      const cls = rate < 0 ? 'm-bad' : rate > 5 ? 'm-good' : 'm-warn';
      html += `<td class="${cls}">${rateTxt}</td>`;
    });
    // 평균 이익률
    // 합계 이익률: 전체 revenue 합 / centerProfit 합 으로 계산
    let totalRev = 0, totalProfit = 0, hasRate = false;
    months.forEach((_,i) => {
      const ym = `${today.getFullYear()}-${String(i+1).padStart(2,'0')}`;
      const rev = getVal(ym,'revenue',centerId);
      const profit = getVal(ym,'centerProfit',centerId) ?? getVal(ym,'hqProfit',centerId) ?? getVal(ym,'totalProfit',centerId);
      if(rev && profit !== null && profit !== undefined){ totalRev += rev; totalProfit += profit; hasRate = true; }
    });
    const sumRate = hasRate && totalRev ? (totalProfit/totalRev*100).toFixed(1)+'%' : '-';
    const avgRate = rateVals.length ? (rateVals.reduce((a,b)=>a+b,0)/rateVals.length).toFixed(1)+'%' : '-';
    const sumRateCls = hasRate && totalProfit < 0 ? 'm-bad' : hasRate && totalProfit/totalRev > 0.05 ? 'm-good' : 'm-warn';
    const avgCls = rateVals.length && rateVals.reduce((a,b)=>a+b,0)/rateVals.length < 0 ? 'm-bad' : 'm-good';
    html += `<td class="${sumRateCls}" style="font-weight:700">${sumRate}</td><td class="${avgCls}">${avgRate}</td></tr>`;
    html += '</tbody>';
    table.innerHTML = html;
  };

  // 빠른 등록
  let mTagVal = '오늘';
  window.mSelTag = function(el, val) {
    document.querySelectorAll('#mobile-app .quick-tag').forEach(t => t.classList.remove('sel'));
    el.classList.add('sel'); mTagVal = val;
  };
  window.mAddQuickEvent = function() {
    const input = document.getElementById('m-quick-input');
    if(!input || !input.value.trim()) return;
    // 실제 깡비서 addEvent 함수 호출
    if(typeof addItem === 'function') {
      // 기존 캘린더 저장 함수 활용 가능
    }
    showToast(`"${input.value}" 일정이 추가됐습니다!`);
    input.value = '';
    mRenderCal();
    mRenderEvents();
  };

  // AI 채팅
  window.mSendChat = function() {
    const input = document.getElementById('m-chat-input');
    const wrap = document.getElementById('m-chat-wrap');
    if(!input || !input.value.trim()) return;
    const msg = input.value; input.value = '';
    const userBubble = document.createElement('div');
    userBubble.style.cssText = 'align-self:flex-end;max-width:82%;padding:10px 14px;border-radius:18px;font-size:13px;background:#00A5FF;color:#fff;border-bottom-right-radius:4px';
    userBubble.textContent = msg;
    wrap.appendChild(userBubble);
    // 실제 AI 호출은 기존 askAI 함수 활용 가능
    const aiBubble = document.createElement('div');
    aiBubble.style.cssText = 'max-width:82%;padding:10px 14px;border-radius:18px;font-size:13px;background:#f0f4ff;color:#333;border-bottom-left-radius:4px';
    aiBubble.textContent = '처리 중...';
    wrap.appendChild(aiBubble);
    wrap.scrollTop = wrap.scrollHeight;
  };

  // 초기화 (데이터 로드 후 실행)
  function mInit() {
    // mSelDate를 오늘로 명확히 설정
    mSelDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    mRenderCal();
    mRenderDday();
    // 오늘 일정 바로 표시
    const lbl = document.getElementById('m-sel-label');
    if(lbl) lbl.textContent = `${today.getMonth()+1}월 ${today.getDate()}일 (오늘)`;
    mRenderEvents();
  }

  // mInit은 init() 완료 후 호출됨 (위 async init 함수에서 호출)
  // 폴백: 1.5초 후에도 실행 안 됐으면 재시도
  setTimeout(() => { if(typeof mInit === 'function') mInit(); }, 1500);

  // 데스크탑 모드 전환
  window.mSwitchToDesktop = function() {
    document.body.classList.add('desktop-mode');
    sessionStorage.setItem('kkangbi_desktop', '1');
  };
  window.mSwitchToMobile = function() {
    document.body.classList.remove('desktop-mode');
    sessionStorage.removeItem('kkangbi_desktop');
  };

  // AI 플로트 버튼 드래그
  (function(){
    const btn = document.getElementById('m-ai-float');
    if(!btn) return;
    let dragging=false, startX, startY, origRight, origBottom;
    btn.addEventListener('touchstart', e => {
      dragging = true;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      const rect = btn.getBoundingClientRect();
      origRight = window.innerWidth - rect.right;
      origBottom = window.innerHeight - rect.bottom;
      e.preventDefault();
    }, {passive:false});
    btn.addEventListener('touchmove', e => {
      if(!dragging) return;
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      let newRight = Math.max(8, Math.min(window.innerWidth - 60, origRight - dx));
      let newBottom = Math.max(80, Math.min(window.innerHeight - 60, origBottom - dy));
      btn.style.right = newRight + 'px';
      btn.style.bottom = newBottom + 'px';
      e.preventDefault();
    }, {passive:false});
    btn.addEventListener('touchend', () => { dragging = false; });
  })();

  // 데스크탑 모드 상태 복원
  if(sessionStorage.getItem('kkangbi_desktop') === '1') {
    document.body.classList.add('desktop-mode');
  }
})();

        </div>
        <div class="dday-scroll" id="m-dday-list"></div>
      </div>

      <!-- 캘린더 -->
      <div class="m-section">
        <div class="m-section-header">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="mMoveMonth(-1)">◀</button>
            <span class="cal-month-lbl" id="m-cal-title"></span>
            <button class="cal-nav-btn" onclick="mMoveMonth(1)">▶</button>
          </div>
        </div>
        <div class="cal-grid" id="m-cal-grid">
          <div class="cal-day-lbl" style="color:#ff4d4f">일</div>
          <div class="cal-day-lbl">월</div>
          <div class="cal-day-lbl">화</div>
          <div class="cal-day-lbl">수</div>
          <div class="cal-day-lbl">목</div>
          <div class="cal-day-lbl">금</div>
          <div class="cal-day-lbl" style="color:#00A5FF">토</div>
        </div>
      </div>

      <!-- 선택 날짜 일정 -->
      <div class="m-section">
        <div class="m-section-header">
          <span class="m-section-title">📅 일정</span>
        </div>
        <div id="m-sel-label" class="msel-label"></div>
        <div class="m-event-list" id="m-event-list"></div>
      </div>
    </div>

    <!-- 손익 탭 -->
    <div class="m-tab-panel" id="m-tab-pl">
      <div class="m-section">
        <div class="m-section-header">
          <span class="m-section-title">💰 센터별 연간 손익</span>
        </div>
        <select class="center-select" id="m-center-select" onchange="mRenderPL()">
          <option value="__all__">📊 전체 합산</option>
        </select>
        <div class="annual-table-wrap">
          <table class="annual-table" id="m-pl-table"></table>
        </div>
      </div>
    </div>

    <!-- AI채팅 탭 -->
    <div class="m-tab-panel" id="m-tab-ai">
      <div class="m-section">
        <div class="m-section-header"><span class="m-section-title">💬 AI 채팅</span></div>
        <div id="m-chat-wrap" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;min-height:200px">
          <div style="max-width:82%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.6;background:#f0f4ff;color:#333;border-bottom-left-radius:4px">안녕하세요! 캘린더나 손익 관련 질문을 입력하세요.</div>
        </div>
        <div style="display:flex;gap:8px">
          <input id="m-chat-input" style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:24px;font-size:13px;outline:none;font-family:inherit" placeholder="질문 입력...">
          <button onclick="mSendChat()" style="background:#00A5FF;color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;flex-shrink:0">↑</button>
        </div>
      </div>
    </div>

    <!-- 회의록 탭 (모바일 전용 — 목록/상세 없이 빠른 업로드만 제공) -->
    <div class="m-tab-panel" id="m-tab-meeting">
      <div class="m-section">
        <div class="m-section-header"><span class="m-section-title">🎙️ 회의록·통화기록 빠른 업로드</span></div>
        <div style="font-size:11px;color:#999;margin-bottom:12px;line-height:1.5">모바일에서는 업로드만 지원합니다. 내용 확인·수정·AI채팅은 PC모드 회의록 탭을 이용해주세요.</div>

        <div style="display:flex;gap:6px;margin-bottom:10px">
          <button id="mu-type-meeting" onclick="muSetType('meeting')" style="flex:1;padding:9px;border-radius:8px;border:1px solid #00A5FF;background:#00A5FF;color:#fff;font-size:12px;font-weight:600;cursor:pointer">📋 회의록</button>
          <button id="mu-type-call" onclick="muSetType('call')" style="flex:1;padding:9px;border-radius:8px;border:1px solid #00A5FF;background:#fff;color:#00A5FF;font-size:12px;font-weight:600;cursor:pointer">☎️ 통화기록</button>
        </div>

        <input type="text" id="mu-center" placeholder="센터명 (예: KB손보)" style="width:100%;margin-bottom:8px;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:13px">
        <input type="text" id="mu-counterpart" placeholder="통화 상대방" style="width:100%;margin-bottom:8px;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:13px;display:none">
        <input type="date" id="mu-date" style="width:100%;margin-bottom:10px;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:13px">

        <div style="display:flex;gap:6px;margin-bottom:10px">
          <button id="mu-mode-file" onclick="muSetMode('file')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#00A5FF;color:#fff;font-size:12px;cursor:pointer">파일 업로드</button>
          <button id="mu-mode-paste" onclick="muSetMode('paste')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:12px;cursor:pointer">텍스트 붙여넣기</button>
        </div>

        <div id="mu-file-area">
          <input type="file" id="mu-file-input" accept=".txt,text/plain" style="width:100%;font-size:12px" onchange="muFileSelected(this.files)">
        </div>
        <div id="mu-paste-area" style="display:none">
          <textarea id="mu-paste-text" rows="8" placeholder="클로바노트 전사 텍스트 또는 통화 메모를 붙여넣으세요" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:vertical"></textarea>
        </div>

        <button id="mu-submit-btn" onclick="muSubmit()" style="width:100%;margin-top:12px;padding:11px;background:#00A5FF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">업로드하고 AI 요약 시작</button>
        <div id="mu-status" style="font-size:12px;color:#888;margin-top:10px;line-height:1.5"></div>
      </div>
    </div>

  </div>

  <!-- 하단 탭바 -->
  <div class="m-tabbar">
    <button class="m-tab active" onclick="mSwitchTab('cal',this)">
      <span class="m-tab-icon">📅</span><span class="m-tab-label">캘린더</span>
    </button>
    <button class="m-tab" onclick="mSwitchTab('pl',this);mRenderPL()">
      <span class="m-tab-icon">💰</span><span class="m-tab-label">손익</span>
    </button>
    <button class="m-tab" onclick="mSwitchTab('ai',this)">
      <span class="m-tab-icon">💬</span><span class="m-tab-label">AI채팅</span>
    </button>
    <button class="m-tab" onclick="mSwitchTab('meeting',this);muInitOnce()">
      <span class="m-tab-icon">📋</span><span class="m-tab-label">회의록</span>
    </button>
    <button class="m-tab" onclick="mSwitchToDesktop()" style="border-left:1px solid #eee">
      <span class="m-tab-icon">🖥️</span><span class="m-tab-label">PC모드</span>
    </button>
  </div>
</div>
</body>
</html>
